<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dopp Spin — Health Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--emerald:#00E5A0;--sky:#38BFFF;--crimson:#FF3B5C;--bg:#05070F;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.09);--text:#F0F4FF;--dim:rgba(240,244,255,0.55)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(5,7,15,0.95);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.back-btn{color:var(--sky);text-decoration:none;font-weight:700;font-size:14px;white-space:nowrap}
.back-btn:hover{opacity:.7}
.game-title{font-family:'Cinzel Decorative',serif;font-size:clamp(13px,3vw,20px);font-weight:900;color:var(--gold);text-align:center}
.score-display{font-family:'Cinzel',serif;font-size:12px;color:var(--emerald);font-weight:600;min-width:70px;text-align:right}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:18px}
.wheel-wrap{position:relative;width:300px;height:300px;flex-shrink:0}
canvas{display:block}
.pointer{position:absolute;top:-12px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:14px solid transparent;border-right:14px solid transparent;border-top:28px solid var(--gold);filter:drop-shadow(0 2px 6px rgba(255,215,0,0.6));z-index:5}
.spin-btn{background:linear-gradient(135deg,var(--crimson),#FF8C00);color:#fff;border:none;padding:14px 44px;border-radius:12px;font-family:'Cinzel Decorative',serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s;letter-spacing:.5px;box-shadow:0 0 20px rgba(255,59,92,0.3)}
.spin-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,59,92,0.5)}
.spin-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.challenge-box{width:100%;max-width:440px;background:rgba(255,215,0,0.08);border:1px solid rgba(255,215,0,0.25);border-radius:16px;padding:18px 20px;display:none;flex-direction:column;align-items:center;gap:12px;text-align:center}
.challenge-label{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:3px;color:var(--gold)}
.challenge-text{font-family:'Cinzel',serif;font-size:clamp(14px,3.5vw,18px);font-weight:700;color:var(--text);line-height:1.4}
.challenge-fact{font-size:12px;color:var(--dim);line-height:1.6}
.action-btns{display:flex;gap:12px}
.done-btn{background:linear-gradient(135deg,var(--emerald),#00b880);color:#05070F;border:none;padding:11px 24px;border-radius:10px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s}
.done-btn:hover{transform:scale(1.04)}
.pass-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--dim);padding:11px 24px;border-radius:10px;font-family:'Cinzel',serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.pass-btn:hover{border-color:rgba(255,255,255,0.2);color:var(--text)}
.score-track{display:flex;gap:16px;align-items:center}
.score-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.score-num{font-family:'Cinzel',serif;font-size:24px;font-weight:700}
.score-lbl{font-size:10px;color:var(--dim);letter-spacing:1px}
.result-screen{display:none;flex-direction:column;align-items:center;gap:18px;text-align:center;width:100%;max-width:440px}
.result-title{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,5vw,32px);font-weight:900;color:var(--gold)}
.result-sub{font-size:14px;color:var(--dim);line-height:1.6}
.play-again-btn{background:linear-gradient(135deg,var(--gold),#FF8C00);color:#05070F;border:none;padding:14px 36px;border-radius:12px;font-family:'Cinzel',serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .2s}
.play-again-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="javascript:history.back()">← Back</a>
  <div class="game-title">Dopp Spin</div>
  <div class="score-display" id="scoreDisplay">✅ 0 | ⏭️ 0</div>
</header>
<main>
  <div class="score-track">
    <div class="score-item"><div class="score-num" id="doneCount" style="color:var(--emerald)">0</div><div class="score-lbl">DONE IT</div></div>
    <div class="score-item"><div class="score-num" id="passCount" style="color:var(--crimson)">0</div><div class="score-lbl">PASSED</div></div>
    <div class="score-item"><div class="score-num" id="spinCount" style="color:var(--gold)">0</div><div class="score-lbl">SPINS</div></div>
  </div>

  <div class="wheel-wrap">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="300" height="300"></canvas>
  </div>

  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🌀 SPIN</button>

  <div class="challenge-box" id="challengeBox">
    <div class="challenge-label">YOUR HEALTH CHALLENGE</div>
    <div class="challenge-text" id="challengeText"></div>
    <div class="challenge-fact" id="challengeFact"></div>
    <div class="action-btns">
      <button class="done-btn" onclick="markDone()">✅ Done It!</button>
      <button class="pass-btn" onclick="markPass()">⏭️ Pass</button>
    </div>
  </div>

  <div class="result-screen" id="resultScreen">
    <div class="result-title">Challenge Complete!</div>
    <div style="display:flex;gap:30px">
      <div class="score-item"><div class="score-num" style="color:var(--emerald);font-size:40px" id="finalDone">0</div><div class="score-lbl">COMPLETED</div></div>
      <div class="score-item"><div class="score-num" style="color:var(--crimson);font-size:40px" id="finalPass">0</div><div class="score-lbl">PASSED</div></div>
    </div>
    <div class="result-sub" id="resultSub"></div>
    <button class="play-again-btn" onclick="restartGame()">Spin Again</button>
  </div>
</main>

<script>
const challenges = [
  {emoji:'💧', label:'Hydration Check', text:'Drink a full glass of water RIGHT NOW', fact:'Dehydration of just 1-2% impairs cognitive performance and mood. Water first!', color:'#38BFFF'},
  {emoji:'🦵', label:'Movement Break', text:'Do 10 jumping jacks right now!', fact:'Even brief bouts of movement improve circulation, focus, and energy for 30+ minutes.', color:'#FF3B5C'},
  {emoji:'📵', label:'Digital Detox', text:'Put your phone face-down for the next 10 minutes', fact:'Phone-free time reduces cortisol, improves focus, and gives your brain a necessary reset.', color:'#9B59B6'},
  {emoji:'❤️', label:'Connection Boost', text:'Tell someone near you one thing you appreciate about them', fact:'Expressing gratitude improves mood for BOTH giver and receiver. Social bonds extend life.', color:'#FF6B9D'},
  {emoji:'🌬️', label:'Breath Reset', text:'Take 5 deep belly breaths — in for 4 counts, out for 6', fact:'Extended exhales activate the parasympathetic nervous system, reducing stress in under 2 minutes.', color:'#00E5A0'},
  {emoji:'🚶', label:'Step Challenge', text:'Take 100 steps — walk around wherever you are!', fact:'Brief walking breaks every 30 minutes reduce blood sugar spikes by 34% over the day.', color:'#FFD700'},
  {emoji:'🧘', label:'Body Scan', text:'Close your eyes for 30 seconds. Notice 3 sensations in your body.', fact:'Brief mindfulness practices reduce perceived stress and improve present-moment awareness.', color:'#38BFFF'},
  {emoji:'🥦', label:'Veggie Pledge', text:'Name 3 vegetables you\'ll eat this week — say them out loud!', fact:'Verbal commitment increases follow-through by up to 65%. Speaking your goals makes them more real.', color:'#00E5A0'}
];

const TOTAL_SPINS = 8;
const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const CX=150,CY=150,R=138;

let spinning=false, currentAngle=0, doneCount=0, passCount=0, spinCount=0, waitingForAction=false;

function drawWheel(rotation){
  ctx.clearRect(0,0,300,300);
  const n=challenges.length;
  const slice=(2*Math.PI)/n;
  challenges.forEach((c,i)=>{
    const start=rotation+i*slice, end=start+slice;
    // wedge
    ctx.beginPath(); ctx.moveTo(CX,CY);
    ctx.arc(CX,CY,R,start,end); ctx.closePath();
    ctx.fillStyle=c.color+'cc'; ctx.fill();
    ctx.strokeStyle='rgba(5,7,15,0.8)'; ctx.lineWidth=2; ctx.stroke();
    // emoji + text
    ctx.save();
    ctx.translate(CX,CY);
    ctx.rotate(start+slice/2);
    ctx.textAlign='left'; ctx.textBaseline='middle';
    ctx.font='20px serif';
    ctx.fillText(c.emoji, R*0.45, 0);
    ctx.font='bold 9px Nunito,sans-serif'; ctx.fillStyle='#fff';
    ctx.shadowColor='rgba(0,0,0,0.8)'; ctx.shadowBlur=4;
    ctx.fillText(c.label, R*0.18, -10);
    ctx.restore();
  });
  // center hub
  const hub=ctx.createRadialGradient(CX,CY,0,CX,CY,32);
  hub.addColorStop(0,'#2a2040'); hub.addColorStop(1,'#0d1030');
  ctx.beginPath(); ctx.arc(CX,CY,30,0,Math.PI*2);
  ctx.fillStyle=hub; ctx.fill();
  ctx.strokeStyle='rgba(255,215,0,0.5)'; ctx.lineWidth=2; ctx.stroke();
  ctx.fillStyle='#FFD700'; ctx.font='bold 14px Cinzel Decorative,serif';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('DOPP', CX, CY);
}

function getWedgeIndex(angle){
  const n=challenges.length;
  const slice=(2*Math.PI)/n;
  // pointer is at top (Math.PI*1.5 in canvas)
  const normalized=((Math.PI*1.5-angle)%(Math.PI*2)+Math.PI*2)%(Math.PI*2);
  return Math.floor(normalized/slice)%n;
}

function spinWheel(){
  if(spinning||waitingForAction) return;
  if(spinCount>=TOTAL_SPINS){showResult();return;}
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('challengeBox').style.display='none';
  const extraSpins=4+Math.random()*4;
  const extraAngle=extraSpins*Math.PI*2+Math.random()*Math.PI*2;
  const targetAngle=currentAngle+extraAngle;
  const dur=3000+Math.random()*1500;
  const start=Date.now();
  const startAngle=currentAngle;
  function frame(){
    const t=Math.min(1,(Date.now()-start)/dur);
    const ease=1-Math.pow(1-t,4);
    currentAngle=startAngle+extraAngle*ease;
    drawWheel(currentAngle);
    if(t<1){requestAnimationFrame(frame);}
    else{
      currentAngle=targetAngle%(Math.PI*2);
      // correct: recompute modulo properly
      currentAngle=targetAngle-(Math.floor(targetAngle/(Math.PI*2))*Math.PI*2);
      drawWheel(currentAngle);
      const idx=getWedgeIndex(currentAngle);
      spinCount++;
      document.getElementById('spinCount').textContent=spinCount;
      showChallenge(challenges[idx]);
      spinning=false;
      waitingForAction=true;
    }
  }
  requestAnimationFrame(frame);
}

function showChallenge(c){
  document.getElementById('challengeText').textContent=c.emoji+' '+c.text;
  document.getElementById('challengeFact').textContent='💡 '+c.fact;
  const box=document.getElementById('challengeBox');
  box.style.borderColor=c.color+'66';
  box.style.background=c.color+'11';
  box.style.display='flex';
}

function markDone(){
  doneCount++;
  updateScores();
  afterAction();
}
function markPass(){
  passCount++;
  updateScores();
  afterAction();
}
function updateScores(){
  document.getElementById('doneCount').textContent=doneCount;
  document.getElementById('passCount').textContent=passCount;
  document.getElementById('scoreDisplay').textContent='✅ '+doneCount+' | ⏭️ '+passCount;
}
function afterAction(){
  waitingForAction=false;
  document.getElementById('challengeBox').style.display='none';
  if(spinCount>=TOTAL_SPINS){showResult();}
  else{document.getElementById('spinBtn').disabled=false;}
}

function showResult(){
  document.getElementById('resultScreen').style.display='flex';
  document.getElementById('finalDone').textContent=doneCount;
  document.getElementById('finalPass').textContent=passCount;
  const pct=doneCount/TOTAL_SPINS;
  document.getElementById('resultSub').textContent=pct>=0.75?'🏆 Health champion! You tackled most challenges like a pro!' : pct>=0.5?'🌟 Solid effort! Every challenge you complete builds healthier habits.' : '💪 Even showing up to spin counts! Small steps, big changes.';
}

function restartGame(){
  doneCount=0;passCount=0;spinCount=0;waitingForAction=false;spinning=false;
  currentAngle=0;
  updateScores();
  document.getElementById('spinCount').textContent='0';
  document.getElementById('challengeBox').style.display='none';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('spinBtn').disabled=false;
  drawWheel(0);
}

drawWheel(0);
</script>
</body>
</html>
