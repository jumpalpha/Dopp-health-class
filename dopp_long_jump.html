<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dopp Long Jump</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05070F;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
header{width:100%;max-width:660px;display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.back-btn{color:#FFD700;font-family:'Cinzel',serif;font-size:13px;text-decoration:none;letter-spacing:1px}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(14px,3.5vw,22px);color:#FFD700;text-align:center;flex:1}
.score-box{font-family:'Cinzel',serif;font-size:12px;color:#38BFFF;text-align:right;min-width:80px}
canvas{border:2px solid #FFD700;border-radius:8px;display:block;max-width:100%}
#ui{width:100%;max-width:660px;padding:8px 16px;display:flex;flex-direction:column;gap:6px}
.meters{display:flex;gap:12px;align-items:center}
.meter-label{font-family:'Cinzel',serif;font-size:11px;color:#FFD700;width:75px}
.meter-bar{flex:1;height:16px;background:#1a1f30;border-radius:8px;overflow:hidden;border:1px solid #38BFFF}
.meter-fill{height:100%;border-radius:8px}
.status{font-family:'Cinzel',serif;font-size:13px;color:#fff;text-align:center;min-height:20px}
.tip{font-family:'Nunito',sans-serif;font-size:12px;color:#00E5A0;font-style:italic;text-align:center;padding:4px}
.attempts-row{display:flex;gap:8px;justify-content:center}
.dot{width:13px;height:13px;border-radius:50%;background:#1a1f30;border:2px solid #FFD700}
.dot.done{background:#FFD700}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="javascript:history.back()">← Back</a>
  <h1>Dopp Long Jump</h1>
  <div class="score-box" id="scoreBox">Best: 0.00m</div>
</header>
<canvas id="c" width="660" height="400"></canvas>
<div id="ui">
  <div class="meters">
    <span class="meter-label">RUN SPEED</span>
    <div class="meter-bar"><div class="meter-fill" id="speedFill" style="width:0%;background:#38BFFF"></div></div>
    <span id="speedVal" style="font-family:'Cinzel',serif;font-size:11px;color:#38BFFF;width:30px">0%</span>
  </div>
  <div class="status" id="status">Mash SPACE / tap rapidly to build speed!</div>
  <div class="attempts-row" id="attRow"></div>
  <div class="tip">⚡ Sprinting engages fast-twitch fibers for explosive power.</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W=canvas.width, H=canvas.height;

function resize(){const s=Math.min(1,window.innerWidth/660);canvas.style.width=(660*s)+'px';canvas.style.height=(400*s)+'px';}
resize(); window.addEventListener('resize',resize);

const GROUND_Y=H-60;
const BOARD_X=220; // takeoff board x
const PIT_X=280; // sand pit start
const PIT_W=280; // pit width on canvas
const MAX_DIST=9.0; // meters (WR ~8.95m)
const WORLD_RECORD=8.95;

let state='run'; // run, takeoff, jumping, landed, done
let speed=0;
let dopX=30, dopY=GROUND_Y;
let dopVX=0, dopVY=0;
let jumped=false;
let attempts=0, maxAttempts=3;
let bestDist=0;
let distances=[];
let landedMarkers=[];
let resultTimer=0;
let lastTap=0;
let t=0;

function setSpeed(v){
  speed=Math.max(0,Math.min(100,v));
  document.getElementById('speedFill').style.width=speed+'%';
  document.getElementById('speedVal').textContent=Math.round(speed)+'%';
}
function updateScore(){document.getElementById('scoreBox').textContent='Best: '+bestDist.toFixed(2)+'m';}
function updateStatus(m){document.getElementById('status').textContent=m;}
function buildAttempts(){
  const r=document.getElementById('attRow');r.innerHTML='';
  for(let i=0;i<maxAttempts;i++){const d=document.createElement('div');d.className='dot'+(i<attempts?' done':'');r.appendChild(d);}
}
buildAttempts();

function initRun(){
  dopX=30;dopY=GROUND_Y;dopVX=0;dopVY=0;jumped=false;speed=0;state='run';
  setSpeed(0);updateStatus('Mash SPACE / tap rapidly to build speed!');
}

document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();onInput();}});
canvas.addEventListener('click',onInput);
canvas.addEventListener('touchstart',e=>{e.preventDefault();onInput();},{passive:false});

function onInput(){
  if(state==='run'){
    const now=Date.now(),dt=now-lastTap;lastTap=now;
    const boost=dt<150?4:dt<300?2.5:1;
    setSpeed(Math.min(100,speed+boost));
  } else if(state==='takeoff'){
    doJump();
  } else if(state==='landed'&&resultTimer<=0){
    if(attempts>=maxAttempts){state='done';}else{initRun();}
  } else if(state==='done'){
    attempts=0;distances=[];landedMarkers=[];buildAttempts();initRun();
  }
}

function doJump(){
  const vx=2+(speed/100)*8;
  const vy=-(3+(speed/100)*5.5);
  dopVX=vx; dopVY=vy;
  jumped=true;
  state='jumping';
  updateStatus('Airborne!');
}

function distToX(d){ return PIT_X+(d/MAX_DIST)*PIT_W; }

function landInPit(){
  const px=(dopX-PIT_X); // pixels in pit
  const d=Math.max(0,(px/PIT_W)*MAX_DIST);
  const realDist=Math.min(d, MAX_DIST);
  distances.push(realDist);
  if(realDist>bestDist){bestDist=realDist;updateScore();}
  landedMarkers.push({x:dopX,dist:realDist});
  attempts++;
  buildAttempts();
  resultTimer=100;
  state='landed';
  updateStatus('Distance: '+realDist.toFixed(2)+'m');
}

function drawDopp(x,y,running=false,jumping=false){
  ctx.save();
  ctx.strokeStyle='#fff';ctx.lineWidth=2.5;
  const legOff=running?Math.sin(Date.now()/65)*12:0;
  ctx.beginPath();ctx.arc(x,y-36,8,0,Math.PI*2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x,y-28);ctx.lineTo(x,y-8);ctx.stroke();
  if(jumping){
    ctx.beginPath();ctx.moveTo(x,y-8);ctx.lineTo(x-15,y+12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-8);ctx.lineTo(x+15,y+4);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x+18,y-28);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x-12,y-10);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(x,y-8);ctx.lineTo(x-8+legOff,y+8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-8);ctx.lineTo(x+8-legOff,y+8);ctx.stroke();
    const ao=running?Math.cos(Date.now()/65)*8:0;
    ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x-14+ao,y-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x,y-22);ctx.lineTo(x+14-ao,y-10);ctx.stroke();
  }
  ctx.restore();
}

function draw(){
  t++;
  ctx.clearRect(0,0,W,H);

  // BG sky
  let g=ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#05070F');g.addColorStop(1,'#0b1428');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,GROUND_Y);

  // Ground/grass
  ctx.fillStyle='#2d5a1b';ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#3a7a25';ctx.fillRect(0,GROUND_Y,W,4);

  // Runway
  ctx.fillStyle='#c8a040';ctx.fillRect(0,GROUND_Y-4,BOARD_X,4);

  // Takeoff board
  ctx.fillStyle='#FF3B5C';ctx.fillRect(BOARD_X-5,GROUND_Y-8,10,8);
  ctx.fillStyle='#FF3B5C';ctx.font='9px Nunito';ctx.fillText('BOARD',BOARD_X-16,GROUND_Y-10);

  // Sand pit
  ctx.fillStyle='#c8a054';ctx.fillRect(PIT_X,GROUND_Y-4,PIT_W,30);
  ctx.strokeStyle='#ddb86a';ctx.lineWidth=1;ctx.strokeRect(PIT_X,GROUND_Y-4,PIT_W,30);
  ctx.fillStyle='#ddb86a';ctx.font='10px Nunito';ctx.fillText('SAND PIT',PIT_X+PIT_W/2-28,GROUND_Y+20);

  // Distance markers in pit
  for(let d=2;d<=MAX_DIST;d+=2){
    const x=distToX(d);
    ctx.strokeStyle='#aaa6';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,GROUND_Y-4);ctx.lineTo(x,GROUND_Y+26);ctx.stroke();
    ctx.fillStyle='#aaa';ctx.font='9px Nunito';ctx.fillText(d+'m',x-8,GROUND_Y-6);
  }
  // WR marker
  const wrX=distToX(WORLD_RECORD);
  ctx.strokeStyle='#FFD700';ctx.lineWidth=1.5;ctx.setLineDash([5,5]);
  ctx.beginPath();ctx.moveTo(wrX,GROUND_Y-30);ctx.lineTo(wrX,GROUND_Y+26);ctx.stroke();
  ctx.setLineDash([]);ctx.fillStyle='#FFD700';ctx.font='bold 9px Nunito';ctx.fillText('WR',wrX-8,GROUND_Y-32);

  // Landed markers
  landedMarkers.forEach(m=>{
    ctx.fillStyle='#FF3B5C';ctx.beginPath();ctx.arc(m.x,GROUND_Y+5,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='10px Nunito';ctx.fillText(m.dist.toFixed(2)+'m',m.x-15,GROUND_Y-8);
  });

  // Run/update
  if(state==='run'){
    setSpeed(Math.max(0,speed-0.2));
    // Show mash prompt
    if(dopX<BOARD_X-5){
      const baseSpd=0.5+(speed/100)*5;
      if(speed>10) dopX=Math.min(BOARD_X-5,dopX+baseSpd);
      drawDopp(dopX,GROUND_Y,speed>15);
    }
    if(dopX>=BOARD_X-5){
      state='takeoff';
      updateStatus('HIT SPACE / tap to JUMP at the board!');
    }
  }

  if(state==='takeoff'){
    drawDopp(dopX,GROUND_Y,false,false);
    // Flashing cue
    if(Math.floor(t/8)%2===0){
      ctx.fillStyle='rgba(255,59,92,0.2)';ctx.fillRect(0,0,W,H);
    }
  }

  if(state==='jumping'){
    dopVY+=0.28;
    dopX+=dopVX*1.2;
    dopY+=dopVY;
    drawDopp(dopX,dopY,false,true);
    if(dopY>=GROUND_Y){
      dopY=GROUND_Y;
      if(dopX<PIT_X){ // Before pit = foul or short
        landInPit();
      } else {
        landInPit();
      }
    }
  }

  if(state==='landed'){
    resultTimer--;
    drawDopp(dopX,GROUND_Y,false);
    const d=distances[distances.length-1];
    ctx.fillStyle='rgba(5,7,15,0.7)';ctx.fillRect(W/2-80,H/2-40,160,55);
    ctx.strokeStyle='#FFD700';ctx.lineWidth=1;ctx.strokeRect(W/2-80,H/2-40,160,55);
    ctx.fillStyle='#FFD700';ctx.font='bold 18px Cinzel,serif';ctx.textAlign='center';
    ctx.fillText(d.toFixed(2)+'m',W/2,H/2-15);
    if(d>=WORLD_RECORD){ctx.fillStyle='#00E5A0';ctx.font='12px Nunito';ctx.fillText('WORLD RECORD!',W/2,H/2+5);}
    ctx.fillStyle='#aaa';ctx.font='11px Nunito';
    ctx.fillText(resultTimer>0?'...':(attempts>=maxAttempts?'Click — see results':'Click to try again'),W/2,H/2+22);
    ctx.textAlign='left';
  }

  if(state==='done'){
    ctx.fillStyle='rgba(5,7,15,0.82)';ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700';ctx.font='bold 22px Cinzel Decorative,serif';ctx.fillText('Round Complete!',W/2,H/2-50);
    ctx.fillStyle='#fff';ctx.font='16px Cinzel,serif';ctx.fillText('Best: '+bestDist.toFixed(2)+'m',W/2,H/2-18);
    ctx.fillStyle='#00E5A0';ctx.font='13px Nunito';ctx.fillText((bestDist/WORLD_RECORD*100).toFixed(0)+'% of WR ('+WORLD_RECORD+'m)',W/2,H/2+8);
    ctx.fillStyle='#38BFFF';ctx.font='13px Nunito';ctx.fillText('Click to play again',W/2,H/2+40);
    ctx.textAlign='left';
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
