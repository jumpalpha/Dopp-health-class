<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hall of Heroes — Legend of Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#FFD700; --gold-dim:#8a6d00; --emerald:#00E5A0; --sky:#38BFFF;
  --crimson:#FF3B5C; --purple:#a855f7; --orange:#FF8C00;
  --bg:#1C1A2E; --card:rgba(255,255,255,0.04); --border:rgba(255,255,255,0.08);
  --text:#F0F4FF; --dim:rgba(240,244,255,0.50);
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }

#stars { position:fixed; inset:0; pointer-events:none; z-index:0;
  background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,215,0,0.07) 0%, transparent 70%),
              radial-gradient(ellipse 40% 30% at 80% 80%, rgba(0,229,160,0.05) 0%, transparent 60%), #1C1A2E; }
#stars::before { content:''; position:absolute; inset:0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 40% 10%, rgba(255,215,0,0.9) 0%, transparent 100%),
    radial-gradient(1px 1px at 65% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 85% 70%, rgba(56,191,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 25% 75%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 75% 15%, rgba(0,229,160,0.7) 0%, transparent 100%); }

nav { position:fixed; top:0; left:0; right:0; z-index:100;
  display:flex; align-items:center; justify-content:space-between;
  padding:11px 24px; background:rgba(5,7,15,0.85); backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border); }
.nav-logo { font-family:'Cinzel',serif; font-size:14px; font-weight:700; color:var(--gold); text-decoration:none; }
.nav-logo span { color:var(--dim); font-weight:400; }
.nav-links { display:flex; gap:6px; }
.nav-link { padding:6px 14px; border-radius:8px; font-size:13px; font-weight:700; color:var(--dim);
  text-decoration:none; border:1px solid transparent; transition:all .15s; }
.nav-link:hover { color:var(--text); border-color:var(--border); background:var(--card); }
.nav-link.active { color:var(--gold); border-color:rgba(255,215,0,0.3); background:rgba(255,215,0,0.06); }

.wrap { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:100px 24px 60px; }

.hero { text-align:center; margin-bottom:40px; }
.hero-icon { font-size:56px; margin-bottom:12px; }
.hero-title { font-family:'Cinzel Decorative',serif; font-size:28px; font-weight:700;
  background:linear-gradient(135deg,#FFD700,#FF8C00); -webkit-background-clip:text;
  -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:8px; }
.hero-sub { font-size:15px; color:var(--dim); line-height:1.6; }

/* PODIUM */
.podium { display:flex; align-items:flex-end; justify-content:center; gap:12px; margin-bottom:40px; }
.podium-card { background:var(--card); border:1px solid var(--border); border-radius:16px;
  padding:20px 16px; text-align:center; flex:1; max-width:220px; transition:all .2s; }
.podium-card:hover { transform:translateY(-4px); }
.podium-1 { border-color:rgba(255,215,0,0.35); background:rgba(255,215,0,0.05); padding-bottom:28px; min-height:200px; }
.podium-2 { border-color:rgba(192,192,192,0.25); background:rgba(192,192,192,0.03); min-height:170px; }
.podium-3 { border-color:rgba(205,127,50,0.25); background:rgba(205,127,50,0.03); min-height:150px; }
.podium-rank   { font-size:32px; margin-bottom:6px; }
.podium-avatar { font-size:36px; margin-bottom:8px; }
.podium-name   { font-family:'Cinzel',serif; font-size:13px; font-weight:700; color:var(--text); margin-bottom:4px; word-break:break-word; }
.podium-period { font-size:11px; color:var(--dim); margin-bottom:8px; }
.podium-xp     { font-family:'Cinzel',serif; font-size:20px; font-weight:700; color:var(--gold); }
.podium-tasks  { font-size:11px; color:var(--dim); margin-top:2px; }

/* FILTER */
.filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
.filter-btn { padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700;
  border:1px solid var(--border); background:var(--card); color:var(--dim);
  cursor:pointer; transition:all .15s; font-family:'Nunito',sans-serif; }
.filter-btn:hover { color:var(--text); border-color:rgba(255,255,255,0.18); }
.filter-btn.active { background:rgba(255,215,0,0.1); border-color:rgba(255,215,0,0.35); color:var(--gold); }
.refresh-btn { margin-left:auto; padding:6px 14px; border-radius:8px; font-size:12px; font-weight:700;
  border:1px solid var(--border); background:var(--card); color:var(--dim);
  cursor:pointer; transition:all .15s; font-family:'Nunito',sans-serif; }
.refresh-btn:hover { color:var(--text); }

/* TABLE */
.lb-card { background:var(--card); border:1px solid var(--border); border-radius:16px; overflow:hidden; margin-bottom:12px; }
.lb-table { width:100%; border-collapse:collapse; }
.lb-table th { font-size:11px; font-weight:700; color:var(--dim); text-align:left;
  padding:10px 16px; border-bottom:1px solid var(--border); letter-spacing:.5px; text-transform:uppercase; white-space:nowrap; }
.lb-table td { padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.04); font-size:13px; vertical-align:middle; }
.lb-table tr:last-child td { border:none; }
.lb-table tr:hover td { background:rgba(255,255,255,0.02); }
.progress-mini { height:6px; background:rgba(255,255,255,0.06); border-radius:3px; overflow:hidden; width:80px; display:inline-block; vertical-align:middle; }
.progress-mini-fill { height:100%; border-radius:3px; background:linear-gradient(90deg,var(--gold),#FF8C00); }
.lb-empty { text-align:center; padding:48px; color:var(--dim); font-size:14px; }
.refresh-note { text-align:center; font-size:12px; color:var(--dim); margin-top:8px; }

@media(max-width:640px) {
  .podium { flex-direction:column; align-items:center; }
  .podium-card { max-width:100%; width:100%; min-height:unset !important; padding:16px !important; }
  .hero-title { font-size:20px; }
  .lb-table th:nth-child(6), .lb-table td:nth-child(6) { display:none; }
}
</style>
<link rel="stylesheet" href="shared.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="stars"></div>

<nav>
  <a class="nav-logo" href="index.html">⚔ <span>Legend of</span> Wellness</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="chapters.html">Chapters</a>
    <a class="nav-link" href="arcade.html">Arcade</a>
    <a class="nav-link" href="quest.html">⚔ Quest</a>
    <a class="nav-link active" href="leaderboard.html">🏆 Hall</a>
    <a class="nav-link" href="parents.html">👪 Parents</a>
  </div>
</nav>

<div class="wrap">
  <div class="hero">
    <div class="hero-icon">🏆</div>
    <div class="hero-title">Hall of Heroes</div>
    <div class="hero-sub">The greatest wellness warriors of Legend of Wellness.<br>Complete quests, earn XP, and claim your place on the leaderboard.</div>
  </div>

  <!-- TOP 3 PODIUM -->
  <div class="podium">
    <div class="podium-card podium-2">
      <div class="podium-rank">🥈</div>
      <div class="podium-avatar" id="pod-2-avatar">—</div>
      <div class="podium-name"   id="pod-2-name">—</div>
      <div class="podium-period" id="pod-2-period">—</div>
      <div class="podium-xp"    id="pod-2-xp">—</div>
      <div class="podium-tasks"  id="pod-2-tasks"></div>
    </div>
    <div class="podium-card podium-1">
      <div class="podium-rank">🥇</div>
      <div class="podium-avatar" id="pod-1-avatar">—</div>
      <div class="podium-name"   id="pod-1-name">—</div>
      <div class="podium-period" id="pod-1-period">—</div>
      <div class="podium-xp"    id="pod-1-xp">—</div>
      <div class="podium-tasks"  id="pod-1-tasks"></div>
    </div>
    <div class="podium-card podium-3">
      <div class="podium-rank">🥉</div>
      <div class="podium-avatar" id="pod-3-avatar">—</div>
      <div class="podium-name"   id="pod-3-name">—</div>
      <div class="podium-period" id="pod-3-period">—</div>
      <div class="podium-xp"    id="pod-3-xp">—</div>
      <div class="podium-tasks"  id="pod-3-tasks"></div>
    </div>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="setFilter('all',this)">All Periods</button>
    <button class="filter-btn" onclick="setFilter('PERIOD1',this)">Period 1</button>
    <button class="filter-btn" onclick="setFilter('PERIOD2',this)">Period 2</button>
    <button class="filter-btn" onclick="setFilter('PERIOD3',this)">Period 3</button>
    <button class="filter-btn" onclick="setFilter('PERIOD4',this)">Period 4</button>
    <button class="filter-btn" onclick="setFilter('PERIOD5',this)">Period 5</button>
    <button class="filter-btn" onclick="setFilter('PERIOD6',this)">Period 6</button>
    <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
  </div>

  <div class="lb-card">
    <table class="lb-table">
      <thead>
        <tr>
          <th style="width:48px;text-align:center">#</th>
          <th style="width:40px"></th>
          <th>Hero</th>
          <th>Period</th>
          <th>XP</th>
          <th>Progress</th>
          <th>Streak</th>
        </tr>
      </thead>
      <tbody id="lb-body">
        <tr><td colspan="7" class="lb-empty">⏳ Summoning heroes…</td></tr>
      </tbody>
    </table>
  </div>
  <div class="refresh-note" id="refresh-note"></div>
</div>

<script>
const SUPABASE_URL = 'https://gmeyamrlqfrabtslsweu.supabase.co';
const SUPABASE_KEY = 'sb_publishable_zClDCZZQEfC9DILpesPiHg_IcyRqW-c';
const TRIMESTER    = '2026-T1';
const XP_PER_TASK  = 25;
const TOTAL_TASKS  = 112;
const PERIOD_LABELS = {PERIOD1:'Period 1',PERIOD2:'Period 2',PERIOD3:'Period 3',
  PERIOD4:'Period 4',PERIOD5:'Period 5',PERIOD6:'Period 6',TEST:'Test'};
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let allData  = [];
let lbFilter = 'all';
let refreshInterval;

async function loadData() {
  document.getElementById('lb-body').innerHTML =
    '<tr><td colspan="7" class="lb-empty">⏳ Summoning heroes…</td></tr>';

  const [studRes, progRes, daysRes] = await Promise.all([
    db.from('students').select('id, display_name, avatar, class_code').eq('trimester', TRIMESTER),
    db.from('quest_progress').select('student_id'),
    db.from('active_days').select('student_id, day_date'),
  ]);

  if (studRes.error) {
    document.getElementById('lb-body').innerHTML =
      '<tr><td colspan="7" class="lb-empty">Could not load data. Try refreshing.</td></tr>';
    return;
  }

  const taskCounts = {}, dayCounts = {}, streakMap = {};
  (progRes.data || []).forEach(r => { taskCounts[r.student_id] = (taskCounts[r.student_id] || 0) + 1; });

  const daysByStudent = {};
  (daysRes.data || []).forEach(r => {
    if (!daysByStudent[r.student_id]) daysByStudent[r.student_id] = new Set();
    daysByStudent[r.student_id].add(r.day_date);
    dayCounts[r.student_id] = (dayCounts[r.student_id] || 0) + 1;
  });
  Object.entries(daysByStudent).forEach(([sid, daySet]) => {
    let streak = 0, d = new Date();
    while (daySet.has(d.toISOString().slice(0,10))) { streak++; d.setDate(d.getDate()-1); }
    streakMap[sid] = streak;
  });

  allData = (studRes.data || []).map(s => ({
    ...s,
    tasks  : taskCounts[s.id] || 0,
    xp     : (taskCounts[s.id] || 0) * XP_PER_TASK,
    days   : dayCounts[s.id]   || 0,
    streak : streakMap[s.id]   || 0,
  })).sort((a, b) => b.xp - a.xp);

  render();
  startCountdown();
}

function render() {
  const rows = lbFilter === 'all' ? allData : allData.filter(s => s.class_code === lbFilter);
  renderPodium(rows);
  renderTable(rows);
}

function renderPodium(rows) {
  [1,2,3].forEach(pos => {
    const s = rows[pos-1];
    document.getElementById(`pod-${pos}-avatar`).textContent = s ? s.avatar || '⚔' : '—';
    document.getElementById(`pod-${pos}-name`).textContent   = s ? s.display_name : '—';
    document.getElementById(`pod-${pos}-period`).textContent = s ? (PERIOD_LABELS[s.class_code] || s.class_code) : '—';
    document.getElementById(`pod-${pos}-xp`).textContent     = s ? s.xp.toLocaleString() + ' XP' : '—';
    document.getElementById(`pod-${pos}-tasks`).textContent  = s ? s.tasks + ' tasks done' : '';
  });
}

function renderTable(rows) {
  const tbody = document.getElementById('lb-body');
  if (!rows.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="lb-empty">No heroes found for this period yet.</td></tr>';
    return;
  }
  const rankIcon = i => i===0?'🥇':i===1?'🥈':i===2?'🥉':
    `<span style="font-family:'Cinzel',serif;color:var(--dim)">${i+1}</span>`;
  tbody.innerHTML = rows.map((s,i) => {
    const pct = Math.round(s.tasks / TOTAL_TASKS * 100);
    return `<tr>
      <td style="text-align:center">${rankIcon(i)}</td>
      <td style="font-size:20px">${s.avatar || '⚔'}</td>
      <td style="font-weight:700;color:var(--text)">${s.display_name}</td>
      <td style="font-size:12px;color:var(--dim)">${PERIOD_LABELS[s.class_code] || s.class_code}</td>
      <td style="font-family:'Cinzel',serif;font-weight:700;color:var(--gold)">${s.xp.toLocaleString()}</td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <div class="progress-mini"><div class="progress-mini-fill" style="width:${pct}%"></div></div>
          <span style="font-size:11px;color:var(--dim)">${pct}%</span>
        </div>
      </td>
      <td style="color:${s.streak>0?'var(--emerald)':'var(--dim)'}">${s.streak>0?'🔥 '+s.streak:'—'}</td>
    </tr>`;
  }).join('');
}

function setFilter(val, el) {
  lbFilter = val;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function startCountdown() {
  clearInterval(refreshInterval);
  const note = document.getElementById('refresh-note');
  let secs = 60;
  note.textContent = `Auto-refreshes in ${secs}s`;
  refreshInterval = setInterval(() => {
    secs--;
    if (secs <= 0) { clearInterval(refreshInterval); loadData(); }
    else note.textContent = `Auto-refreshes in ${secs}s`;
  }, 1000);
}

loadData();
</script>
</body>
</html>
