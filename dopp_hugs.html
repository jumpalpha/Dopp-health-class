<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤗 Dopp Hugs — Legend of Wellness</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#1C1A2E;color:#F0F4FF;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow:hidden;user-select:none}
header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(5,7,15,0.95);border-bottom:1px solid rgba(255,150,200,0.2);flex-shrink:0}
.back-btn{color:#FFD700;font-weight:700;text-decoration:none;font-family:'Cinzel',serif;font-size:13px}
.hdr-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:#FFD700}
.hdr-right{font-family:'Cinzel',serif;font-size:13px;color:#F0F4FF;text-align:right;min-width:120px}
#wrap{position:relative;width:100%;max-width:620px;flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 12px 6px}
canvas{display:block;border-radius:14px;border:1px solid rgba(255,150,200,0.1)}
#msg{height:34px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:rgba(255,180,220,0.85);text-align:center;margin-top:6px;padding:0 12px}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="javascript:history.back()">← Back</a>
  <div class="hdr-title">🤗 Dopp Hugs</div>
  <div class="hdr-right" id="hdr-right">Hugs: 0</div>
</header>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="msg">Collect hugs to make Dopp happy — but stop before he cries! 😭</div>
</div>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const WRAP = document.getElementById('wrap');

function resize(){
  const w = Math.min(WRAP.clientWidth-24, 620);
  cv.width = w; cv.height = Math.min(window.innerHeight-140, 520);
}
resize();
window.addEventListener('resize',()=>{ resize(); initGame(); });

// ── PALETTE ──────────────────────────────────────
const PINK='#FF69B4', GOLD='#FFD700', EMERALD='#00E5A0', SKY='#38BFFF', CRIMSON='#FF3B5C';
const HEARTS=['#FF69B4','#FF1493','#FFB6C1','#FF6EB4','#C71585','#FFD700'];

// ── HAPPINESS SCALE ──────────────────────────────
// 0 = neutral, hugs push happiness up
// Safe zone: 0–75  Danger zone: 75–90  Cry zone: 90+
const CRY_THRESHOLD = 90;
const DANGER_THRESHOLD = 75;
const MAX_HAPPINESS = 100;

// ── STATE ────────────────────────────────────────
let hugs, happiness, particles, hearts, tears, phase;
// phase: 'play' | 'cry' | 'win'
let doppScale, blushAlpha, trembleTimer, heartbeatT;
let score; // hugs collected without crying

function W(){ return cv.width; }
function H(){ return cv.height; }
const DOPP_X = ()=> W()/2;
const DOPP_Y = ()=> H()/2 + 20;

function initGame(){
  hugs = 0; happiness = 0; score = 0;
  particles = []; hearts = []; tears = [];
  phase = 'play';
  doppScale = 1; blushAlpha = 0; trembleTimer = 0; heartbeatT = 0;
  spawnHug();
  updateHdr();
  document.getElementById('msg').textContent = 'Collect hugs to make Dopp happy — but stop before he cries! 😭';
}

function updateHdr(){
  document.getElementById('hdr-right').textContent = `Hugs: ${hugs}  😊 ${Math.round(happiness)}%`;
}

// ── HUG OBJECTS (falling hearts) ─────────────────
function spawnHug(){
  const count = Math.min(1 + Math.floor(hugs/5), 4);
  for(let i=0;i<count;i++){
    setTimeout(()=>{
      if(phase!=='play') return;
      hearts.push({
        x: 60 + Math.random()*(W()-120),
        y: -30,
        vy: 1.8 + Math.random()*1.2 + hugs*0.04,
        vx: (Math.random()-.5)*1.2,
        size: 22 + Math.random()*14,
        color: HEARTS[Math.floor(Math.random()*HEARTS.length)],
        rot: (Math.random()-.5)*0.5,
        id: Math.random()
      });
    }, i*220);
  }
}

// ── DRAW HEART ────────────────────────────────────
function drawHeart(x,y,size,color,alpha=1){
  cx.globalAlpha=alpha;
  cx.fillStyle=color;
  cx.save(); cx.translate(x,y);
  cx.beginPath();
  cx.moveTo(0,-size*0.25);
  cx.bezierCurveTo(size*0.5,-size*0.75,size,-size*0.1,0,size*0.55);
  cx.bezierCurveTo(-size,-size*0.1,-size*0.5,-size*0.75,0,-size*0.25);
  cx.fill();
  // shine
  cx.fillStyle='rgba(255,255,255,0.25)';
  cx.beginPath(); cx.ellipse(-size*0.2,-size*0.05,size*0.12,size*0.08,-0.4,0,Math.PI*2); cx.fill();
  cx.restore();
  cx.globalAlpha=1;
}

// ── DRAW DOPP ─────────────────────────────────────
function drawDopp(){
  const cx2=cx;
  const x=DOPP_X(), y=DOPP_Y();
  const h=happiness/100; // 0→1
  const tremble = trembleTimer>0 ? Math.sin(trembleTimer*1.8)*3 : 0;
  const tx=x+tremble, ty=y;

  heartbeatT+=0.08;
  const beat = phase==='play' ? 1+Math.sin(heartbeatT)*0.015*h*5 : 1;
  const sc = doppScale * beat;

  cx2.save(); cx2.translate(tx,ty); cx2.scale(sc,sc); cx2.translate(-tx,-ty);

  // ── Body ──
  // Color shifts: grey-blue → warm pink → red (too much love)
  const bodyR = Math.round(lerp(lerp(80,255,h), 255, Math.max(0,(h-0.75)/0.25)));
  const bodyG = Math.round(lerp(100,150,h) * (h>0.75?lerp(1,0.4,(h-0.75)/0.25):1));
  const bodyB = Math.round(lerp(140,170,1-h) * (h>0.75?lerp(1,0.5,(h-0.75)/0.25):1));
  const bodyColor=`rgb(${bodyR},${bodyG},${bodyB})`;

  // Body size grows with happiness (hugs puff him up)
  const bw = lerp(44,62,h*0.5);
  const bh = lerp(54,68,h*0.4);

  cx2.fillStyle=bodyColor;
  cx2.beginPath(); cx2.ellipse(tx,ty,bw,bh,0,0,Math.PI*2); cx2.fill();

  // Shirt pattern: heart grows on chest
  if(h>0.2){
    cx2.globalAlpha=Math.min(1,(h-0.2)/0.3);
    drawHeart(tx,ty-8,bw*0.35*h,'rgba(255,105,180,0.5)');
    cx2.globalAlpha=1;
  }

  // Arms in different positions based on happiness
  const armColor=bodyColor;
  cx2.strokeStyle=armColor; cx2.lineWidth=bw*0.35; cx2.lineCap='round';
  if(h<0.3){
    // Arms down (neutral)
    cx2.beginPath(); cx2.moveTo(tx-bw,ty-5); cx2.lineTo(tx-bw-18,ty+20); cx2.stroke();
    cx2.beginPath(); cx2.moveTo(tx+bw,ty-5); cx2.lineTo(tx+bw+18,ty+20); cx2.stroke();
  } else if(h<0.7){
    // Arms out (happy)
    cx2.beginPath(); cx2.moveTo(tx-bw,ty-10); cx2.lineTo(tx-bw-22,ty-5); cx2.stroke();
    cx2.beginPath(); cx2.moveTo(tx+bw,ty-10); cx2.lineTo(tx+bw+22,ty-5); cx2.stroke();
  } else {
    // Arms up (ecstatic / about to cry)
    const wave=Math.sin(heartbeatT*3)*8;
    cx2.beginPath(); cx2.moveTo(tx-bw,ty-15); cx2.lineTo(tx-bw-14,ty-35+wave); cx2.stroke();
    cx2.beginPath(); cx2.moveTo(tx+bw,ty-15); cx2.lineTo(tx+bw+14,ty-35-wave); cx2.stroke();
  }

  // Legs
  cx2.lineWidth=bw*0.38;
  cx2.beginPath(); cx2.moveTo(tx-bw*0.35,ty+bh*0.9); cx2.lineTo(tx-bw*0.4,ty+bh+12); cx2.stroke();
  cx2.beginPath(); cx2.moveTo(tx+bw*0.35,ty+bh*0.9); cx2.lineTo(tx+bw*0.4,ty+bh+12); cx2.stroke();

  // Head
  const headR=lerp(24,28,h*0.4);
  cx2.fillStyle=bodyColor;
  cx2.beginPath(); cx2.arc(tx,ty-bh-headR*0.5,headR,0,Math.PI*2); cx2.fill();

  // Blush
  blushAlpha = lerp(0,0.6,Math.max(0,(h-0.3)/0.5));
  cx2.fillStyle=`rgba(255,100,150,${blushAlpha})`;
  cx2.beginPath(); cx2.ellipse(tx-headR*0.7,ty-bh-headR*0.35,headR*0.32,headR*0.18,0,0,Math.PI*2); cx2.fill();
  cx2.beginPath(); cx2.ellipse(tx+headR*0.7,ty-bh-headR*0.35,headR*0.32,headR*0.18,0,0,Math.PI*2); cx2.fill();

  // Eyes — change with happiness
  const ey=ty-bh-headR*0.55;
  if(phase==='cry' || h>=1){
    // Crying eyes (X X)
    cx2.strokeStyle='#333'; cx2.lineWidth=2.5;
    [tx-headR*0.38, tx+headR*0.38].forEach(ex=>{
      cx2.beginPath(); cx2.moveTo(ex-5,ey-5); cx2.lineTo(ex+5,ey+5); cx2.stroke();
      cx2.beginPath(); cx2.moveTo(ex+5,ey-5); cx2.lineTo(ex-5,ey+5); cx2.stroke();
    });
  } else if(h>0.7){
    // Star eyes (sparkling)
    cx2.fillStyle=GOLD;
    [tx-headR*0.38, tx+headR*0.38].forEach(ex=>{
      for(let s=0;s<4;s++){
        const a=s*Math.PI/2+heartbeatT*0.5;
        cx2.fillRect(ex+Math.cos(a)*4-2,ey+Math.sin(a)*4-2,4,4);
      }
      cx2.beginPath(); cx2.arc(ex,ey,3,0,Math.PI*2); cx2.fill();
    });
  } else {
    // Normal eyes, bigger when happier
    const er=lerp(2.5,4,h);
    cx2.fillStyle='#222';
    cx2.beginPath(); cx2.arc(tx-headR*0.38,ey,er,0,Math.PI*2); cx2.fill();
    cx2.beginPath(); cx2.arc(tx+headR*0.38,ey,er,0,Math.PI*2); cx2.fill();
    // Sparkle
    if(h>0.4){
      cx2.fillStyle='rgba(255,255,255,0.8)';
      cx2.beginPath(); cx2.arc(tx-headR*0.32,ey-1.5,1.2,0,Math.PI*2); cx2.fill();
      cx2.beginPath(); cx2.arc(tx+headR*0.44,ey-1.5,1.2,0,Math.PI*2); cx2.fill();
    }
  }

  // Mouth — scales with happiness
  cx2.lineCap='round';
  if(phase==='cry'){
    // Sad mouth (upside down curve)
    cx2.strokeStyle='#444'; cx2.lineWidth=2.5;
    cx2.beginPath(); cx2.arc(tx,ty-bh-headR*0.2+6,headR*0.35,Math.PI+0.3,-0.3); cx2.stroke();
  } else {
    const smileSize=lerp(headR*0.2,headR*0.55,h);
    cx2.strokeStyle='#333'; cx2.lineWidth=2.5;
    cx2.beginPath(); cx2.arc(tx,ty-bh-headR*0.32,smileSize,-0.1+0.1*(1-h),Math.PI+0.1-0.1*(1-h)); cx2.stroke();
  }

  // Tears when crying
  if(phase==='cry'){
    cx2.fillStyle='rgba(56,191,255,0.8)';
    const tearWobble=Math.sin(heartbeatT*4)*2;
    cx2.beginPath(); cx2.ellipse(tx-headR*0.5+tearWobble,ty-bh+5,3,7,0.2,0,Math.PI*2); cx2.fill();
    cx2.beginPath(); cx2.ellipse(tx+headR*0.5-tearWobble,ty-bh+5,3,7,-0.2,0,Math.PI*2); cx2.fill();
  }

  cx2.restore();
}

// ── HAPPINESS BAR ─────────────────────────────────
function drawHappyBar(){
  const bx=W()-22, by=20, bw=10, bh=H()-80;
  // Track
  cx.fillStyle='rgba(255,255,255,0.05)';
  roundRect(bx-bw,by,bw,bh,5); cx.fill();

  // Fill
  const fillH=bh*(happiness/MAX_HAPPINESS);
  const grd=cx.createLinearGradient(0,by,0,by+bh);
  grd.addColorStop(0,CRIMSON);
  grd.addColorStop(0.1,'#FF8C00');
  grd.addColorStop(0.25,GOLD);
  grd.addColorStop(0.55,PINK);
  grd.addColorStop(1,EMERALD);
  cx.fillStyle=grd;
  roundRect(bx-bw,by+(bh-fillH),bw,fillH,5); cx.fill();

  // Danger zone marker
  const dangY=by+bh*(1-DANGER_THRESHOLD/MAX_HAPPINESS);
  cx.strokeStyle='rgba(255,59,92,0.6)'; cx.lineWidth=1.5; cx.setLineDash([4,3]);
  cx.beginPath(); cx.moveTo(bx-bw-18,dangY); cx.lineTo(bx+4,dangY); cx.stroke();
  cx.setLineDash([]);
  cx.font='9px Nunito'; cx.textAlign='right'; cx.fillStyle='rgba(255,59,92,0.7)';
  cx.fillText('⚠️',bx-bw-4,dangY+4);

  // Labels
  cx.font='9px Nunito'; cx.textAlign='center'; cx.fillStyle='rgba(240,244,255,0.35)';
  cx.fillText('😭',bx-bw/2,by-4);
  cx.fillStyle=EMERALD; cx.fillText('😊',bx-bw/2,by+bh+12);
}

function roundRect(x,y,w,h,r){
  cx.beginPath();
  cx.moveTo(x+r,y); cx.lineTo(x+w-r,y); cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r); cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h); cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r); cx.quadraticCurveTo(x,y,x+r,y); cx.closePath();
}

function lerp(a,b,t){ return a+(b-a)*Math.max(0,Math.min(1,t)); }

// ── PARTICLES ─────────────────────────────────────
function spawnCollect(x,y){
  for(let i=0;i<14;i++){
    particles.push({
      x,y,vx:(Math.random()-.5)*9,vy:(Math.random()-1.3)*8,
      size:Math.random()*6+3,
      color:HEARTS[Math.floor(Math.random()*HEARTS.length)],
      life:1,dec:0.022+Math.random()*0.014
    });
  }
}

// ── MESSAGES ─────────────────────────────────────
const HAPPY_MSGS=[
  "Dopp loves the hug! 🤗","Someone cares! 💖","Keep the love coming! 😄",
  "Dopp is glowing! ✨","Social connection = better health!","His heart is full! 💗",
  "Friendship is medicine! 🏥","Hugs reduce stress hormones!","Dopamine spike! 🧠",
  "Dopp is beaming! 🌟",
];
const DANGER_MSGS=[
  "⚠️ Careful — Dopp is overwhelmed!","😰 Too much emotion building up!",
  "🚨 Almost at the cry zone!","😬 Dopp's eyes are getting watery...",
];

// ── LOOP ──────────────────────────────────────────
let spawnTimer=0, spawnInterval=200;
let lastT=0;

function loop(ts){
  const dt=Math.min(ts-lastT,50); lastT=ts;
  cx.fillStyle='#1C1A2E'; cx.fillRect(0,0,W(),H());

  // Warm glow bg based on happiness
  if(phase==='play'||phase==='win'){
    const gAlpha=happiness/MAX_HAPPINESS*0.12;
    const grd=cx.createRadialGradient(W()/2,H()/2,10,W()/2,H()/2,W()*0.7);
    grd.addColorStop(0,`rgba(255,105,180,${gAlpha})`);
    grd.addColorStop(1,'transparent');
    cx.fillStyle=grd; cx.fillRect(0,0,W(),H());
  }

  // Particles
  particles=particles.filter(p=>p.life>0);
  particles.forEach(p=>{
    cx.globalAlpha=p.life;
    cx.fillStyle=p.color;
    cx.beginPath(); cx.arc(p.x,p.y,p.size,0,Math.PI*2); cx.fill();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.2; p.life-=p.dec;
  });
  cx.globalAlpha=1;

  // Spawn & move hearts
  if(phase==='play'){
    spawnTimer+=dt;
    if(spawnTimer>spawnInterval){
      spawnHug();
      spawnTimer=0;
      spawnInterval=Math.max(800,2200-hugs*60);
    }
  }

  hearts=hearts.filter(h=>h.y<H()+50);
  hearts.forEach(h=>{
    h.y+=h.vy; h.x+=h.vx; h.rot+=0.02;
    cx.save(); cx.translate(h.x,h.y); cx.rotate(h.rot); cx.translate(-h.x,-h.y);
    drawHeart(h.x,h.y,h.size,h.color,0.85);
    cx.restore();
  });

  if(trembleTimer>0) trembleTimer-=dt*0.05;
  drawDopp();
  drawHappyBar();

  if(phase==='play'){
    // HUD: warning label
    if(happiness>=DANGER_THRESHOLD){
      cx.font='bold 12px Nunito'; cx.textAlign='center';
      cx.fillStyle=`rgba(255,59,92,${0.6+Math.sin(Date.now()/200)*0.3})`;
      cx.fillText('⚠️ STOP COLLECTING HUGS ⚠️', W()/2, 22);
    }

  } else if(phase==='cry'){
    cx.fillStyle='rgba(5,7,15,0.75)'; cx.fillRect(0,0,W(),H());
    cx.textAlign='center';
    cx.font='bold 36px Nunito'; cx.fillStyle=SKY;
    cx.fillText('😭 Too Many Hugs!',W()/2,H()/2-60);
    cx.font='16px Nunito'; cx.fillStyle='rgba(240,244,255,0.7)';
    cx.fillText(`Dopp collected ${score} hugs before getting overwhelmed.`,W()/2,H()/2-20);
    cx.font='13px Nunito'; cx.fillStyle='rgba(240,244,255,0.4)';
    cx.fillText('Even good things need balance — that\'s health! 💙',W()/2,H()/2+14);
    drawBtn(W()/2,H()/2+64,'▶ Try Again');

  } else if(phase==='win'){
    cx.fillStyle='rgba(5,7,15,0.6)'; cx.fillRect(0,0,W(),H());
    cx.textAlign='center';
    cx.font='bold 32px Nunito'; cx.fillStyle=GOLD;
    cx.shadowColor=GOLD; cx.shadowBlur=18;
    cx.fillText('🌟 Perfect Happiness!',W()/2,H()/2-55);
    cx.shadowBlur=0;
    cx.font='16px Nunito'; cx.fillStyle=PINK;
    cx.fillText(`${score} hugs — Dopp is glowing with joy!`,W()/2,H()/2-18);
    cx.font='13px Nunito'; cx.fillStyle='rgba(240,244,255,0.45)';
    cx.fillText('Social connection is one of the strongest predictors of health. 💗',W()/2,H()/2+14);
    drawBtn(W()/2,H()/2+62,'▶ Play Again');
  }

  requestAnimationFrame(loop);
}

function drawBtn(x,y,label){
  const bw=180,bh=42;
  cx.fillStyle='rgba(255,215,0,0.1)';
  roundRect(x-bw/2,y-bh/2,bw,bh,10); cx.fill();
  cx.strokeStyle='rgba(255,215,0,0.4)'; cx.lineWidth=1.5;
  roundRect(x-bw/2,y-bh/2,bw,bh,10); cx.stroke();
  cx.font='bold 14px Nunito'; cx.fillStyle=GOLD; cx.textAlign='center';
  cx.fillText(label,x,y+5);
}

// ── CLICK TO COLLECT HUGS ─────────────────────────
cv.addEventListener('click',e=>{
  if(phase==='cry'||phase==='win'){
    const r=cv.getBoundingClientRect();
    const mx=(e.clientX-r.left)*(W()/r.width), my=(e.clientY-r.top)*(H()/r.height);
    const by=phase==='cry'?H()/2+64:H()/2+62;
    if(Math.abs(mx-W()/2)<90&&Math.abs(my-by)<22){ initGame(); }
    return;
  }
  if(phase!=='play') return;

  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W()/r.width);
  const my=(e.clientY-r.top)*(H()/r.height);

  // Check if clicked a heart
  let collected=false;
  hearts=hearts.filter(h=>{
    const dist=Math.hypot(mx-h.x,my-h.y);
    if(dist<h.size*2){
      collected=true;
      spawnCollect(h.x,h.y);
      hugs++;
      score=hugs;
      happiness=Math.min(MAX_HAPPINESS, happiness+8+Math.random()*4);
      trembleTimer=8;
      updateHdr();

      // Pick message
      if(happiness>=DANGER_THRESHOLD){
        document.getElementById('msg').textContent=DANGER_MSGS[Math.floor(Math.random()*DANGER_MSGS.length)];
      } else {
        document.getElementById('msg').textContent=HAPPY_MSGS[Math.floor(Math.random()*HAPPY_MSGS.length)];
      }

      if(happiness>=CRY_THRESHOLD){ phase='cry'; hearts=[]; }
      return false;
    }
    return true;
  });
});

// ── STOP BUTTON ── (click Dopp to stop and win)
// If happiness is in the sweet zone (30–74) clicking Dopp = win
cv.addEventListener('click',e=>{
  if(phase!=='play') return;
  const r=cv.getBoundingClientRect();
  const mx=(e.clientX-r.left)*(W()/r.width), my=(e.clientY-r.top)*(H()/r.height);
  const dist=Math.hypot(mx-DOPP_X(), my-DOPP_Y());
  if(dist<55 && happiness>=30 && happiness<CRY_THRESHOLD){
    phase='win';
    hearts=[];
    document.getElementById('msg').textContent='';
    // Confetti burst
    for(let i=0;i<60;i++){
      particles.push({
        x:DOPP_X(),y:DOPP_Y()-40,
        vx:(Math.random()-.5)*14,vy:(Math.random()-1.8)*10,
        size:Math.random()*8+3,
        color:[GOLD,PINK,'#a855f7',SKY,EMERALD][Math.floor(Math.random()*5)],
        life:1,dec:0.012+Math.random()*0.01
      });
    }
  }
});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const touch=e.touches[0];
  cv.dispatchEvent(new MouseEvent('click',{clientX:touch.clientX,clientY:touch.clientY}));
},{passive:false});

initGame();
requestAnimationFrame(loop);
</script>
</body>
</html>
