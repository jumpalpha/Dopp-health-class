<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Chapters — Legend of Wellness</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--gold-dim:#B8960C;--bg:#05070F;--card:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--text:#F0F4FF;--dim:rgba(240,244,255,0.55)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 70% 40% at 50% 0%,rgba(255,215,0,0.06) 0%,transparent 70%),#05070F}
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(5,7,15,0.9);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
.nav-logo{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);text-decoration:none}
.nav-logo span{color:var(--dim);font-weight:400}
.nav-links{display:flex;gap:6px}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:700;color:var(--dim);text-decoration:none;border:1px solid transparent;transition:all .2s}
.nav-link:hover,.nav-link.active{color:var(--text);border-color:var(--border);background:var(--card)}
.nav-link.active{color:var(--gold);border-color:rgba(255,215,0,0.3);background:rgba(255,215,0,0.06)}
.page-header{position:relative;z-index:1;padding:110px 32px 48px;text-align:center;max-width:700px;margin:0 auto}
.hero-badge{display:inline-block;font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:3px;color:var(--gold-dim);border:1px solid rgba(255,215,0,0.2);padding:5px 14px;border-radius:20px;background:rgba(255,215,0,0.04);margin-bottom:18px}
.page-title{font-family:'Cinzel Decorative',serif;font-size:clamp(26px,4.5vw,46px);font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.1}
.page-sub{font-size:15px;color:var(--dim);line-height:1.7;max-width:500px;margin:0 auto}
.section{position:relative;z-index:1;padding:0 32px 24px;max-width:1100px;margin:0 auto}
.realm-block{margin-bottom:48px}
.realm-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:12px;border-left:3px solid var(--realm-color,var(--gold))}
.realm-icon-sm{font-size:22px}
.realm-info{flex:1}
.realm-name-sm{font-family:'Cinzel',serif;font-size:15px;font-weight:700;color:var(--text)}
.realm-meta-sm{font-size:12px;color:var(--dim);margin-top:2px}
.realm-badge-sm{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,0.05);color:var(--realm-color,var(--gold));border:1px solid currentColor;opacity:.8;white-space:nowrap}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.ch-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-decoration:none;display:flex;flex-direction:column;transition:all .2s;position:relative;overflow:hidden}
.ch-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--ch-col,var(--gold));transform:scaleX(0);transform-origin:left;transition:transform .25s}
.ch-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px)}
.ch-card:hover::after{transform:scaleX(1)}
.ch-num{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:2px;color:var(--ch-col,var(--gold));margin-bottom:4px}
.ch-title{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:10px;flex:1}
.ch-links{display:flex;gap:6px;flex-wrap:wrap}
.ch-link{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;background:rgba(255,255,255,0.05);color:var(--dim);text-decoration:none;border:1px solid var(--border);transition:all .15s}
.ch-link:hover{background:rgba(255,215,0,0.08);border-color:rgba(255,215,0,0.2);color:var(--gold)}
footer{position:relative;z-index:1;border-top:1px solid var(--border);padding:24px 32px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.footer-brand{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);font-weight:600}
.footer-tags{font-size:13px;color:var(--dim)}
@media(max-width:700px){nav{padding:12px 16px}.nav-link{padding:6px 10px;font-size:12px}.section{padding:0 20px 20px}.page-header{padding:90px 20px 36px}}
</style>
</head>
<body>
<div id="stars"></div>

<nav>
  <a class="nav-logo" href="index.html">⚔ <span>Legend of</span> Wellness</a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="chapters.html">Chapters</a>
    <a class="nav-link" href="arcade.html">Arcade</a>
    <a class="nav-link" href="quest.html">⚔ Quest</a>
    <a class="nav-link" href="leaderboard.html">🏆 Hall</a>
    <a class="nav-link" href="teacher.html">👨‍🏫 Teacher</a>
    <a class="nav-link" href="parents.html">👪 Parents</a>
  </div>
</nav>

<div class="page-header">
  <div class="hero-badge">28 Chapters · 9 Realms</div>
  <h1 class="page-title">All Chapters</h1>
  <p class="page-sub">Every chapter includes the full PDF, four vocabulary games, quest activities, and recommended arcade games.</p>
</div>

<div class="section" id="realm-blocks"></div>

<footer>
  <div class="footer-brand">⚔ The Legend of Wellness</div>
  <div class="footer-tags">#OnedayIwokeup &nbsp;·&nbsp; #Doppitup</div>
  <a href="index.html" style="font-size:13px;color:var(--dim);text-decoration:none">← Home</a>
</footer>

<script>
const REALMS=[
  {num:"I",name:"Foundation Keep",icon:"🏰",color:"#38BFFF",weeks:"Weeks 1–2",badge:"Wellness Apprentice",
   chapters:[
    {n:1,title:"Understanding Health & Wellness"},
    {n:2,title:"Skills for a Healthy Life"},
  ]},
  {num:"II",name:"Mind Citadel",icon:"🧠",color:"#a855f7",weeks:"Weeks 3–5",badge:"Mind Knight",
   chapters:[
    {n:3,title:"Mental and Emotional Health"},
    {n:4,title:"Managing Stress"},
    {n:5,title:"Mental and Emotional Problems"},
  ]},
  {num:"III",name:"Relationship Realm",icon:"💞",color:"#FF3B5C",weeks:"Weeks 6–9",badge:"Social Champion",
   chapters:[
    {n:6,title:"Building Healthy Relationships"},
    {n:7,title:"Conflict Resolution"},
    {n:8,title:"Violence Prevention"},
    {n:9,title:"Family Relationships"},
  ]},
  {num:"IV",name:"Nourish Dungeon",icon:"🥗",color:"#00E5A0",weeks:"Weeks 9–11",badge:"Body Warrior",
   chapters:[
    {n:10,title:"Nutrition for Health"},
    {n:11,title:"Managing Weight"},
    {n:12,title:"Physical Activity"},
  ]},
  {num:"V",name:"Body Labyrinth",icon:"⚙️",color:"#FF8C00",weeks:"Weeks 11–14",badge:"System Sage",
   chapters:[
    {n:13,title:"Personal Health Care"},
    {n:14,title:"Skeletal, Muscular & Nervous Systems"},
    {n:15,title:"Cardiovascular, Respiratory & Digestive"},
    {n:16,title:"Endocrine & Reproductive Health"},
  ]},
  {num:"VI",name:"Life Cycle Shrine",icon:"🌱",color:"#38BFFF",weeks:"Weeks 15–16",badge:"Life Keeper",
   chapters:[
    {n:17,title:"The Beginning of the Life Cycle"},
    {n:18,title:"The Life Cycle Continues"},
  ]},
  {num:"VII",name:"Shadow World",icon:"💀",color:"#FF3B5C",weeks:"Weeks 17–20",badge:"Shadow Slayer",
   chapters:[
    {n:19,title:"Medicines & Drugs"},
    {n:20,title:"Tobacco"},
    {n:21,title:"Alcohol"},
    {n:22,title:"Illegal Drugs"},
  ]},
  {num:"VIII",name:"Disease Fortress",icon:"🏥",color:"#aaaaaa",weeks:"Weeks 21–24",badge:"Health Guardian",
   chapters:[
    {n:23,title:"Communicable Diseases"},
    {n:24,title:"STIs & HIV/AIDS"},
    {n:25,title:"Noncommunicable Diseases & Disabilities"},
  ]},
  {num:"IX",name:"The Final Tower",icon:"★",color:"#FFD700",weeks:"Weeks 25–27",badge:"★ Master of Wellness",
   chapters:[
    {n:26,title:"Safety & Injury Prevention"},
    {n:27,title:"First Aid & Emergencies"},
    {n:28,title:"Community & Environmental Health"},
  ]},
];

const container=document.getElementById('realm-blocks');
REALMS.forEach(r=>{
  container.innerHTML+=`
    <div class="realm-block">
      <div class="realm-header" style="--realm-color:${r.color}">
        <div class="realm-icon-sm">${r.icon}</div>
        <div class="realm-info">
          <div class="realm-name-sm">Realm ${r.num} — ${r.name}</div>
          <div class="realm-meta-sm">${r.weeks} · ${r.chapters.length} chapter${r.chapters.length>1?'s':''}</div>
        </div>
        <div class="realm-badge-sm" style="color:${r.color}">${r.badge}</div>
      </div>
      <div class="chapter-grid">
        ${r.chapters.map(ch=>`
          <a class="ch-card" href="chapter${String(ch.n).padStart(2,'0')}.html" style="--ch-col:${r.color}">
            <div class="ch-num">Chapter ${ch.n}</div>
            <div class="ch-title">${ch.title}</div>
            <div class="ch-links">
              <span class="ch-link">📄 PDF</span>
              <span class="ch-link">🎮 Vocab</span>
              <span class="ch-link">⚔ Quest</span>
            </div>
          </a>`).join('')}
      </div>
    </div>`;
});
</script>
</body>
</html>
