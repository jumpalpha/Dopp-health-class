<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dopp High Jump</title>
<meta name="description" content="Play classroom health games and review activities from the Legend of Wellness health curriculum.">
<link rel="canonical" href="https://doppsclass.com/dopp_high_jump.html">
<meta property="og:title" content="Dopp High Jump">
<meta property="og:description" content="Play classroom health games and review activities from the Legend of Wellness health curriculum.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://doppsclass.com/dopp_high_jump.html">
<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#FDFAF2;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh}
header{width:100%;max-width:660px;display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.back-btn{color:#FFD700;font-family:'Cinzel',serif;font-size:13px;text-decoration:none;letter-spacing:1px}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(14px,3.5vw,22px);color:#FFD700;text-align:center;flex:1}
.score-box{font-family:'Cinzel',serif;font-size:12px;color:#38BFFF;text-align:right;min-width:80px}
canvas{border:2px solid #FFD700;border-radius:8px;display:block;max-width:100%}
#ui{width:100%;max-width:660px;padding:8px 16px;display:flex;flex-direction:column;gap:6px}
.status{font-family:'Cinzel',serif;font-size:13px;color:#fff;text-align:center;min-height:20px}
.tip{font-family:'Nunito',sans-serif;font-size:12px;color:#00E5A0;font-style:italic;text-align:center;padding:4px}
.info-row{display:flex;justify-content:space-between;font-family:'Cinzel',serif;font-size:12px;color:#aaa;padding:0 4px}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="javascript:history.back()">← Back</a>
  <h1>Dopp High Jump</h1>
  <div class="score-box" id="scoreBox">Best: 0.00m</div>
</header>
<canvas id="c" width="660" height="420"></canvas>
<div id="ui">
  <div class="info-row">
    <span id="heightLabel">Bar: 1.50m</span>
    <span id="missLabel">Misses: 0/2</span>
    <span id="recLabel">WR: 2.45m</span>
  </div>
  <div class="status" id="status">Approach running — press SPACE or tap at the sweet spot!</div>
  <div class="tip">🦘 Plyometric training increases vertical jump and power output.</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

function resize(){
  const s=Math.min(1,window.innerWidth/660);
  canvas.style.width=(660*s)+'px'; canvas.style.height=(420*s)+'px';
}
resize(); window.addEventListener('resize',resize);

const GROUND_Y = H-60;
const BAR_X = W-120;
const STANDARD_X1 = BAR_X - 30;
const STANDARD_X2 = BAR_X + 30;
const WORLD_RECORD = 2.45;
const BAR_START = 1.50;
const BAR_INCREMENT = 0.05;
const HEIGHT_SCALE = 80; // pixels per meter above ground for display

let barHeight = BAR_START;
let misses = 0;
let maxMisses = 2;
let bestHeight = 0;
let state = 'approach'; // approach, jumping, result, done
let dopX = 40;
let dopY = GROUND_Y;
let dopVY = 0;
let dopVX = 3.5;
let jumped = false;
let jumpSuccess = false;
let timingZone = {start:0, end:0};
let sweetSpot = 0;
let resultTimer = 0;
let t = 0;
let flashColor = '';
let flashTimer = 0;
let bodyFlip = false; // Fosbury flop arc phase

// Timing bar
let timingBar = { val: 0, speed: 2.5, dir: 1 };

function barY(){ return GROUND_Y - (barHeight / 3.0) * HEIGHT_SCALE; }

function updateUI(){
  document.getElementById('heightLabel').textContent = 'Bar: '+barHeight.toFixed(2)+'m';
  document.getElementById('missLabel').textContent = 'Misses: '+misses+'/'+maxMisses;
  document.getElementById('scoreBox').textContent = 'Best: '+bestHeight.toFixed(2)+'m';
}

function updateStatus(m){ document.getElementById('status').textContent=m; }

function initApproach(){
  dopX=40; dopY=GROUND_Y; dopVX=3.5+barHeight*0.4; dopVY=0;
  jumped=false; jumpSuccess=false; state='approach'; bodyFlip=false;
  updateStatus('Press SPACE or tap when the timing bar hits the sweet spot!');
}

function jump(quality){
  // quality 0-1 based on timing bar
  const jumpPower = 4.5 + quality*5 + barHeight*0.3;
  dopVY = -jumpPower;
  dopVX = dopVX*0.6;
  jumped = true;
  state = 'jumping';
}

function attemptResult(cleared){
  if(cleared){
    if(barHeight > bestHeight){ bestHeight = barHeight; }
    misses=0;
    barHeight = Math.round((barHeight+BAR_INCREMENT)*100)/100;
    state='result'; jumpSuccess=true; resultTimer=90;
    flashColor='#00E5A0'; flashTimer=20;
    updateStatus('CLEARED! Bar raised to '+barHeight.toFixed(2)+'m!');
  } else {
    misses++;
    flashColor='#FF3B5C'; flashTimer=20;
    if(misses>=maxMisses){
      state='done';
      updateStatus('Round over! Best: '+bestHeight.toFixed(2)+'m');
    } else {
      state='result'; jumpSuccess=false; resultTimer=90;
      updateStatus('Knocked bar! Retry ('+misses+'/'+maxMisses+' misses)');
    }
  }
  updateUI();
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){ e.preventDefault(); onJumpInput(); }
});
canvas.addEventListener('click', onJumpInput);
canvas.addEventListener('touchstart',e=>{e.preventDefault(); onJumpInput();},{passive:false});

function onJumpInput(){
  if(state==='approach'){
    // Check timing bar quality
    const diff = Math.abs(timingBar.val - sweetSpot);
    const quality = Math.max(0, 1 - diff/40);
    jump(quality);
  } else if(state==='result' && resultTimer<=0){
    nextRound();
  } else if(state==='done'){
    barHeight=BAR_START; misses=0; bestHeight=bestHeight; updateUI(); initApproach();
  }
}

function nextRound(){
  initApproach();
}

function drawDopp(x,y,running=false,arcing=false){
  ctx.save();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.fillStyle='#fff';
  if(arcing){
    // Fosbury flop: rotate body
    ctx.translate(x,y);
    ctx.rotate(-0.8);
    ctx.beginPath(); ctx.arc(0,-8,8,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,16); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(-12,20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(12,20); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(-14,-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,4); ctx.lineTo(14,-4); ctx.stroke();
  } else {
    const legOff = running ? Math.sin(Date.now()/70)*10 : 0;
    ctx.beginPath(); ctx.arc(x,y-36,8,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-28); ctx.lineTo(x,y-8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-8); ctx.lineTo(x-8+legOff,y+8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-8); ctx.lineTo(x+8-legOff,y+8); ctx.stroke();
    const armOff = running?Math.cos(Date.now()/70)*8:0;
    ctx.beginPath(); ctx.moveTo(x,y-22); ctx.lineTo(x-14+armOff,y-10); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x,y-22); ctx.lineTo(x+14-armOff,y-10); ctx.stroke();
  }
  ctx.restore();
}

// Timing bar sweet spot changes each attempt
function initSweetSpot(){ sweetSpot=40+Math.random()*20; }
initSweetSpot();

function draw(){
  t++;
  ctx.clearRect(0,0,W,H);

  // BG
  let g=ctx.createLinearGradient(0,0,0,GROUND_Y);
  g.addColorStop(0,'#1C1A2E'); g.addColorStop(1,'#0b1428');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,GROUND_Y);
  // Ground
  ctx.fillStyle='#2d5a1b'; ctx.fillRect(0,GROUND_Y,W,H-GROUND_Y);
  ctx.fillStyle='#3a7a25'; ctx.fillRect(0,GROUND_Y,W,5);
  // Runway
  ctx.fillStyle='#b04000'; ctx.fillRect(0,GROUND_Y-4,W,4);

  // Standards
  ctx.strokeStyle='#aaa'; ctx.lineWidth=5;
  const by=barY();
  ctx.beginPath(); ctx.moveTo(STANDARD_X1,GROUND_Y); ctx.lineTo(STANDARD_X1,by-60); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(STANDARD_X2,GROUND_Y); ctx.lineTo(STANDARD_X2,by-60); ctx.stroke();
  // Height markers on standards
  for(let h=1.0;h<=3.0;h+=0.25){
    const hy=GROUND_Y-(h/3.0)*HEIGHT_SCALE;
    ctx.strokeStyle=h===WORLD_RECORD?'#FFD700':'#444';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(STANDARD_X1-5,hy); ctx.lineTo(STANDARD_X1,hy); ctx.stroke();
    if(h===WORLD_RECORD||h%0.5===0){
      ctx.fillStyle=h===WORLD_RECORD?'#FFD700':'#666';
      ctx.font='9px Nunito'; ctx.fillText(h.toFixed(2)+'m', STANDARD_X2+4,hy+3);
    }
  }

  // The bar
  const barColor = state==='jumping'&&jumped ? '#FF3B5C' : '#ccc';
  ctx.strokeStyle=barColor; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(STANDARD_X1,by); ctx.lineTo(STANDARD_X2,by); ctx.stroke();

  // Flash overlay
  if(flashTimer>0){ flashTimer--; ctx.fillStyle=flashColor+'33'; ctx.fillRect(0,0,W,H); }

  // Timing bar (shown during approach)
  if(state==='approach'){
    const tbY=40;
    const tbW=200, tbH=20;
    const tbX=W/2-tbW/2;
    ctx.fillStyle='#1a1f30'; ctx.fillRect(tbX,tbY,tbW,tbH);
    // Sweet spot zone
    const spX=tbX+(sweetSpot/100)*tbW;
    ctx.fillStyle='#00E5A020';
    ctx.fillRect(spX-20,tbY,40,tbH);
    ctx.strokeStyle='#00E5A0'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(spX,tbY); ctx.lineTo(spX,tbY+tbH); ctx.stroke();
    // Bouncing marker
    timingBar.val+=timingBar.speed*timingBar.dir;
    if(timingBar.val>=100||timingBar.val<=0) timingBar.dir*=-1;
    const mx=tbX+(timingBar.val/100)*tbW;
    ctx.fillStyle='#FFD700';
    ctx.beginPath(); ctx.arc(mx,tbY+tbH/2,6,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='#1a1f30'; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle='#aaa'; ctx.font='9px Nunito'; ctx.textAlign='center';
    ctx.fillText('HIT SWEET SPOT',W/2,tbY+tbH+13); ctx.textAlign='left';
  }

  // Dopp movement
  if(state==='approach'){
    dopX = Math.min(STANDARD_X1-20, dopX+dopVX);
    drawDopp(dopX, GROUND_Y, true);
    if(dopX>=STANDARD_X1-25){
      // Auto-miss if they haven't jumped
      const quality=0.1;
      jump(quality);
    }
  }

  if(state==='jumping'){
    dopVY+=0.35;
    dopY+=dopVY;
    dopX+=dopVX;
    const isArcing = dopY < barY()+20;
    drawDopp(dopX, dopY, false, isArcing);
    // Landing
    if(dopY>=GROUND_Y){
      dopY=GROUND_Y;
      // Check clearance
      const cleared = (GROUND_Y-dopY >= 0) && checkClearance();
      attemptResult(cleared);
    }
  }

  if(state==='result'){
    resultTimer--;
    if(resultTimer<=0) updateStatus('Click/tap to continue');
    drawDopp(BAR_X+60, GROUND_Y, false);
  }

  // Height display
  ctx.fillStyle='#FFD700'; ctx.font='bold 14px Cinzel,serif';
  ctx.fillText('Bar: '+barHeight.toFixed(2)+'m', 10, 25);
  const wrY=GROUND_Y-(WORLD_RECORD/3.0)*HEIGHT_SCALE;
  ctx.strokeStyle='#FFD70055'; ctx.lineWidth=1; ctx.setLineDash([5,5]);
  ctx.beginPath(); ctx.moveTo(0,wrY); ctx.lineTo(STANDARD_X1,wrY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#FFD70088'; ctx.font='9px Nunito';
  ctx.fillText('WR '+WORLD_RECORD+'m', 2, wrY-2);

  if(state==='done'){
    ctx.fillStyle='rgba(5,7,15,0.82)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center';
    ctx.fillStyle='#FFD700'; ctx.font='bold 22px Cinzel Decorative,serif';
    ctx.fillText('Round Over!',W/2,H/2-50);
    ctx.fillStyle='#fff'; ctx.font='16px Cinzel,serif';
    ctx.fillText('Best Height: '+bestHeight.toFixed(2)+'m',W/2,H/2-18);
    const pct=(bestHeight/WORLD_RECORD*100).toFixed(0);
    ctx.fillStyle='#00E5A0'; ctx.font='13px Nunito';
    ctx.fillText(pct+'% of WR ('+WORLD_RECORD+'m)',W/2,H/2+8);
    ctx.fillStyle='#38BFFF'; ctx.font='13px Nunito';
    ctx.fillText('Click to play again',W/2,H/2+40);
    ctx.textAlign='left';
  }

  requestAnimationFrame(draw);
}

function checkClearance(){
  // Dopp's arc: check if at peak they were above the bar
  // We use peak height relative to bar
  const peakY=barY()-20;
  return dopY>=GROUND_Y && jumpSuccess===false && checkPeakAboveBar();
}

// Track peak during jump
let peakDopY = GROUND_Y;
let prevDopVY = 0;
function checkPeakAboveBar(){
  // Cleared if peak (min Y) was above (less than) barY
  return peakDopY <= barY()+8;
}

// Override draw to track peak
const origDraw=draw;
let drawRunning=false;
function drawLoop(){
  if(state==='jumping'){
    if(dopVY>=0 && prevDopVY<0){
      peakDopY=dopY;
    }
    prevDopVY=dopVY;
  } else { peakDopY=GROUND_Y; }
}

// Re-wire the draw to also track peak
const _draw = draw;
requestAnimationFrame(function loop(){
  drawLoop();
  requestAnimationFrame(loop);
});

initApproach(); updateUI();
draw();
</script>
</body>
</html>
