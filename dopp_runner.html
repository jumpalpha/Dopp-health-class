<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dopp Runner – Health Class</title>
<meta name="description" content="Play classroom health games and review activities from the Legend of Wellness health curriculum.">
<link rel="canonical" href="https://doppsclass.com/dopp_runner.html">
<meta property="og:title" content="Dopp Runner – Health Class">
<meta property="og:description" content="Play classroom health games and review activities from the Legend of Wellness health curriculum.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://doppsclass.com/dopp_runner.html">
<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Cinzel:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#FDFAF2;color:#fff;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;min-height:100vh;overflow-x:hidden}
#header{width:100%;max-width:820px;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,215,0,0.18)}
#back-btn{color:#FFD700;font-family:'Cinzel',sans-serif;font-size:14px;text-decoration:none;opacity:.85;transition:opacity .2s}
#back-btn:hover{opacity:1}
#game-title{font-family:'Cinzel Decorative',cursive;color:#FFD700;font-size:clamp(15px,3vw,21px);text-align:center}
#score-display{font-family:'Cinzel',sans-serif;font-size:14px;color:#00E5A0;text-align:right;min-width:100px}
#main{display:flex;flex-direction:column;align-items:center;padding:12px 10px 30px;width:100%;max-width:820px}
canvas{display:block;border:2px solid rgba(255,215,0,0.2);border-radius:8px;max-width:100%}
#best-disp{font-family:'Cinzel',sans-serif;font-size:13px;color:#a855f7;margin-top:8px}
#tap-hint{font-family:'Nunito',sans-serif;font-size:13px;color:#555;margin-top:6px}
</style>
</head>
<body>
<div id="header">
  <a id="back-btn" href="javascript:history.back()">← Back</a>
  <span id="game-title">Dopp Runner</span>
  <span id="score-display">Score: <span id="scoreVal">0</span></span>
</div>
<div id="main">
  <canvas id="c" width="640" height="300"></canvas>
  <div id="best-disp">Best: <span id="bestVal">0</span></div>
  <div id="tap-hint">Space / Tap to jump</div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=640,H=300;
const GROUND=240;
const WIN_SCORE=300;
let score,bestScore,gameState,animFrame;
let player,obstacles,vitamins,particles,floatTexts;
let frameCount,speed,scrollX,scrollX2;
let doubleJump,doubleJumpTimer,doubleJumpActive;
let flashRed,flashTimer;
bestScore=parseInt(localStorage.getItem('runnerBest')||'0');
document.getElementById('bestVal').textContent=bestScore;

const OBS_TYPES=[
  {label:'🍔',kind:'burger',w:38,h:56,color:'#FF8C00',pts:0},
  {label:'🥤',kind:'soda',w:28,h:44,color:'#FF3B5C',pts:0},
  {label:'🍟',kind:'fries',w:50,h:30,color:'#FFD700',pts:0},
];

function initGame(){
  score=0;frameCount=0;speed=4;scrollX=0;scrollX2=0;
  flashRed=false;flashTimer=0;
  player={x:90,y:GROUND,w:28,h:56,vy:0,onGround:true,leg:0,legTimer:0};
  obstacles=[];vitamins=[];particles=[];floatTexts=[];
  doubleJump=false;doubleJumpTimer=0;doubleJumpActive=false;
  gameState='running';
  document.getElementById('scoreVal').textContent=0;
  if(animFrame) cancelAnimationFrame(animFrame);
  loop();
}

function jump(){
  if(gameState==='dead'||gameState==='win'){initGame();return;}
  if(gameState==='start'){initGame();return;}
  if(player.onGround){
    player.vy=-13;
    player.onGround=false;
  } else if(doubleJump&&!doubleJumpActive){
    player.vy=-12;
    doubleJumpActive=true;
    floatTexts.push({x:player.x,y:player.y-20,text:'Double Jump!',color:'#FFD700',life:50});
  }
}

document.addEventListener('keydown',e=>{
  if(e.code==='Space'){e.preventDefault();jump();}
});
canvas.addEventListener('pointerdown',jump);

function loop(){
  update();
  draw();
  animFrame=requestAnimationFrame(loop);
}

function update(){
  if(gameState!=='running') return;
  frameCount++;
  score=Math.floor(frameCount*0.15*(speed/4));
  if(frameCount%200===0) speed=Math.min(10,speed+0.3);
  document.getElementById('scoreVal').textContent=score;
  if(score>=WIN_SCORE){winGame();return;}

  // parallax scroll
  scrollX-=speed*0.3;
  scrollX2-=speed;
  if(scrollX<-W) scrollX=0;
  if(scrollX2<-W) scrollX2=0;

  // player physics
  player.vy+=0.7;
  player.y+=player.vy;
  if(player.y>=GROUND){player.y=GROUND;player.vy=0;player.onGround=true;doubleJumpActive=false;}
  // leg animation
  player.legTimer++;
  if(player.legTimer%10===0&&player.onGround) player.leg=1-player.leg;

  // obstacles
  if(frameCount%Math.floor(80/speed*4)===0){
    const t=OBS_TYPES[Math.floor(Math.random()*OBS_TYPES.length)];
    obstacles.push({x:W+20,y:GROUND+player.h-t.h,w:t.w,h:t.h,label:t.label,kind:t.kind,color:t.color});
  }
  obstacles.forEach(o=>o.x-=speed);
  obstacles=obstacles.filter(o=>o.x+o.w>-10);

  // vitamins
  if(frameCount%150===0){
    vitamins.push({x:W+20,y:GROUND-80-Math.random()*60,r:12,label:'VIT',alive:true});
  }
  vitamins.forEach(v=>v.x-=speed);
  vitamins=vitamins.filter(v=>v.x>-20&&v.alive);

  // double jump timer
  if(doubleJump){
    doubleJumpTimer--;
    if(doubleJumpTimer<=0) doubleJump=false;
  }

  // collision – obstacles
  obstacles.forEach(o=>{
    if(player.x+player.w-6>o.x&&player.x+6<o.x+o.w&&player.y+player.h>o.y+6&&player.y<o.y+o.h){
      hitPlayer();
    }
  });

  // collect vitamins
  vitamins.forEach(v=>{
    if(!v.alive) return;
    const dx=player.x+player.w/2-v.x;
    const dy=player.y+player.h/2-v.y;
    if(Math.sqrt(dx*dx+dy*dy)<v.r+player.w/2){
      v.alive=false;
      score+=10;
      doubleJump=true;doubleJumpTimer=300;
      floatTexts.push({x:v.x,y:v.y-10,text:'+10 VIT!',color:'#00E5A0',life:60});
    }
  });

  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vy+=0.1;});
  particles=particles.filter(p=>p.life>0);
  floatTexts.forEach(f=>{f.y-=0.5;f.life--;});
  floatTexts=floatTexts.filter(f=>f.life>0);

  // flash
  if(flashRed){flashTimer--;if(flashTimer<=0)flashRed=false;}
}

function winGame(){
  gameState='win';
  if(score>bestScore){bestScore=score;localStorage.setItem('runnerBest',bestScore);document.getElementById('bestVal').textContent=bestScore;}
}

function hitPlayer(){
  if(flashRed) return;
  gameState='dead';
  if(score>bestScore){bestScore=score;localStorage.setItem('runnerBest',bestScore);document.getElementById('bestVal').textContent=bestScore;}
}

function draw(){
  ctx.clearRect(0,0,W,H);

  // flash
  if(flashRed){ctx.fillStyle='rgba(255,59,92,0.25)';ctx.fillRect(0,0,W,H);}

  // sky gradient
  const sky=ctx.createLinearGradient(0,0,0,GROUND);
  sky.addColorStop(0,'#050a1a');sky.addColorStop(1,'#0d1530');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,GROUND+2);

  // mountains (parallax layer 1)
  ctx.fillStyle='rgba(56,191,255,0.05)';
  for(let i=0;i<6;i++){
    const mx=((i*130+scrollX*0.5)%W+W)%W;
    const mh=60+i*15;
    ctx.beginPath();
    ctx.moveTo(mx,GROUND);ctx.lineTo(mx+60,GROUND-mh);ctx.lineTo(mx+120,GROUND);
    ctx.closePath();ctx.fill();
  }
  // close hills (parallax layer 2)
  ctx.fillStyle='rgba(0,229,160,0.07)';
  for(let i=0;i<8;i++){
    const hx=((i*90+scrollX2*0.7)%W+W)%W;
    ctx.beginPath();
    ctx.moveTo(hx,GROUND);ctx.lineTo(hx+35,GROUND-35);ctx.lineTo(hx+70,GROUND);
    ctx.closePath();ctx.fill();
  }

  // ground
  ctx.fillStyle='#111820';
  ctx.fillRect(0,GROUND+player.h,W,H-GROUND-player.h);
  ctx.strokeStyle='#00E5A0';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(0,GROUND+player.h);ctx.lineTo(W,GROUND+player.h);ctx.stroke();
  // ground detail
  ctx.strokeStyle='rgba(0,229,160,0.15)';ctx.lineWidth=1;
  for(let i=0;i<8;i++){
    const gx=((i*90+scrollX2)%W+W)%W;
    ctx.beginPath();ctx.moveTo(gx,GROUND+player.h+4);ctx.lineTo(gx+40,GROUND+player.h+4);ctx.stroke();
  }

  // obstacles
  obstacles.forEach(drawObstacleSprite);

  // vitamins
  vitamins.forEach(v=>{
    if(!v.alive) return;
    drawVitaminSprite(v.x,v.y,v.r);
  });

  // player (sprite runner)
  drawPlayer();

  // double jump indicator
  if(doubleJump&&!player.onGround){
    ctx.fillStyle='rgba(255,215,0,0.6)';
    ctx.beginPath();ctx.arc(player.x+player.w/2,player.y-8,5,0,Math.PI*2);ctx.fill();
  }

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life/30;
    ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // float texts
  floatTexts.forEach(f=>{
    ctx.globalAlpha=Math.min(1,f.life/20);
    ctx.font='bold 13px Nunito,sans-serif';
    ctx.fillStyle=f.color;
    ctx.textAlign='center';
    ctx.fillText(f.text,f.x,f.y);
  });
  ctx.globalAlpha=1;

  // score display on canvas
  ctx.font='bold 16px Cinzel,sans-serif';
  ctx.fillStyle='rgba(255,215,0,0.7)';
  ctx.textAlign='right';
  ctx.fillText('Score: '+score,W-12,24);
  if(doubleJump){
    ctx.font='11px Nunito,sans-serif';
    ctx.fillStyle='#FFD700';
    ctx.fillText('Double Jump!',W-12,40);
  }

  // win overlay
  if(gameState==='win'){
    ctx.fillStyle='rgba(5,7,15,0.78)';
    ctx.fillRect(0,0,W,H);
    ctx.font='bold 28px Cinzel Decorative,cursive';
    ctx.fillStyle='#00E5A0';
    ctx.textAlign='center';
    ctx.fillText('YOU WIN!',W/2,H/2-30);
    ctx.font='16px Cinzel,sans-serif';
    ctx.fillStyle='#FFD700';
    ctx.fillText('Score: '+score+' / '+WIN_SCORE,W/2,H/2+5);
    ctx.font='13px Nunito,sans-serif';
    ctx.fillStyle='#aaa';
    ctx.fillText('Space / Tap to play again',W/2,H/2+42);
  }

  // game over overlay
  if(gameState==='dead'){
    ctx.fillStyle='rgba(5,7,15,0.78)';
    ctx.fillRect(0,0,W,H);
    ctx.font='bold 28px Cinzel Decorative,cursive';
    ctx.fillStyle='#FF3B5C';
    ctx.textAlign='center';
    ctx.fillText('GAME OVER',W/2,H/2-30);
    ctx.font='16px Cinzel,sans-serif';
    ctx.fillStyle='#FFD700';
    ctx.fillText('Score: '+score,W/2,H/2+5);
    ctx.font='14px Cinzel,sans-serif';
    ctx.fillStyle='#00E5A0';
    ctx.fillText('Best: '+bestScore,W/2,H/2+28);
    ctx.font='13px Nunito,sans-serif';
    ctx.fillStyle='#aaa';
    ctx.fillText('Space / Tap to restart',W/2,H/2+58);
  }

  if(gameState==='start'){
    ctx.fillStyle='rgba(5,7,15,0.75)';
    ctx.fillRect(0,0,W,H);
    ctx.font='bold 24px Cinzel Decorative,cursive';
    ctx.fillStyle='#FFD700';
    ctx.textAlign='center';
    ctx.fillText('Dopp Runner',W/2,H/2-20);
    ctx.font='14px Nunito,sans-serif';
    ctx.fillStyle='#aaa';
    ctx.fillText('Space / Tap to start',W/2,H/2+16);
  }
}

function drawObstacleSprite(o){
  ctx.save();
  ctx.translate(o.x,o.y);
  ctx.shadowColor=o.color;ctx.shadowBlur=8;
  if(o.kind==='burger') drawBurgerSprite(o.w,o.h);
  else if(o.kind==='soda') drawSodaSprite(o.w,o.h);
  else drawFriesSprite(o.w,o.h);
  ctx.restore();
}

function drawBurgerSprite(w,h){
  const cy=h*0.55;
  ctx.fillStyle='rgba(255,140,0,0.16)';ctx.beginPath();ctx.roundRect(0,8,w,h-12,8);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle='#d68a2e';ctx.beginPath();ctx.roundRect(3,6,w-6,14,9);ctx.fill();
  ctx.fillStyle='#fff2b8';for(let i=0;i<4;i++)ctx.fillRect(9+i*7,10,3,2);
  ctx.fillStyle='#9b4b2c';ctx.beginPath();ctx.roundRect(5,cy-4,w-10,10,4);ctx.fill();
  ctx.fillStyle='#00E5A0';for(let i=0;i<4;i++){ctx.beginPath();ctx.arc(8+i*8,cy+6,5,0,Math.PI);ctx.fill();}
  ctx.fillStyle='#f2b84b';ctx.beginPath();ctx.roundRect(4,cy+10,w-8,8,4);ctx.fill();
  ctx.strokeStyle='#FF8C00';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(1,5,w-2,h-8,8);ctx.stroke();
}

function drawSodaSprite(w,h){
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,59,92,0.18)';ctx.beginPath();ctx.roundRect(1,2,w-2,h-4,6);ctx.fill();
  ctx.fillStyle='#FF3B5C';ctx.beginPath();ctx.roundRect(5,8,w-10,h-12,5);ctx.fill();
  ctx.fillStyle='#ffffff';ctx.fillRect(8,14,w-16,12);
  ctx.fillStyle='#1C1A2E';ctx.font='bold 8px Nunito';ctx.textAlign='center';ctx.fillText('SODA',w/2,23);
  ctx.strokeStyle='#FFD700';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(w*0.55,8);ctx.lineTo(w*0.75,-4);ctx.stroke();
  ctx.strokeStyle='#FF3B5C';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(4,7,w-8,h-10,5);ctx.stroke();
}

function drawFriesSprite(w,h){
  ctx.shadowBlur=0;
  ctx.fillStyle='rgba(255,215,0,0.18)';ctx.beginPath();ctx.roundRect(0,2,w,h-2,6);ctx.fill();
  for(let i=0;i<5;i++){
    ctx.fillStyle=i%2?'#FFD700':'#ffb84d';
    ctx.fillRect(8+i*7,0,5,20+(i%3)*4);
  }
  ctx.fillStyle='#FF3B5C';ctx.beginPath();ctx.moveTo(7,13);ctx.lineTo(w-7,13);ctx.lineTo(w-12,h);ctx.lineTo(12,h);ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 8px Nunito';ctx.textAlign='center';ctx.fillText('FRIES',w/2,h-6);
  ctx.strokeStyle='#FFD700';ctx.lineWidth=2;ctx.stroke();
}

function drawVitaminSprite(x,y,r){
  const pulse=1+Math.sin(frameCount*0.12)*0.08;
  ctx.save();ctx.translate(x,y);ctx.scale(pulse,pulse);
  ctx.shadowColor='#00E5A0';ctx.shadowBlur=14;
  ctx.fillStyle='rgba(0,229,160,0.26)';ctx.beginPath();ctx.arc(0,0,r+6,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.rotate(-0.45);
  ctx.fillStyle='#00E5A0';ctx.beginPath();ctx.roundRect(-r*1.15,-r*0.55,r*2.3,r*1.1,r*0.55);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.beginPath();ctx.roundRect(0,-r*0.55,r*1.15,r*1.1,r*0.55);ctx.fill();
  ctx.strokeStyle='#1C1A2E';ctx.lineWidth=2;ctx.stroke();
  ctx.rotate(0.45);
  ctx.font='bold 8px Cinzel,sans-serif';ctx.fillStyle='#1C1A2E';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('VIT',0,1);
  ctx.restore();ctx.textBaseline='alphabetic';
}

function drawPlayer(){
  const px=player.x, py=player.y, ph=player.h, pw=player.w;
  const run=player.onGround ? (player.leg ? 1 : -1) : 0;
  const bob=player.onGround ? Math.sin(frameCount*0.45)*2 : -2;
  const x=px+pw/2, y=py+bob;

  ctx.save();
  ctx.translate(x,y);
  ctx.shadowColor='#00E5A0';ctx.shadowBlur=10;

  ctx.fillStyle='rgba(56,191,255,0.26)';
  ctx.beginPath();ctx.moveTo(-7,25);ctx.lineTo(-26,40-run*4);ctx.lineTo(-7,45);ctx.closePath();ctx.fill();

  ctx.shadowBlur=0;
  ctx.strokeStyle='#FFD700';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-4,38);ctx.lineTo(-13+run*7,56);ctx.stroke();
  ctx.beginPath();ctx.moveTo(6,38);ctx.lineTo(16-run*7,54);ctx.stroke();
  ctx.strokeStyle='#00E5A0';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-13+run*7,56);ctx.lineTo(-3+run*9,56);ctx.stroke();
  ctx.beginPath();ctx.moveTo(16-run*7,54);ctx.lineTo(26-run*7,54);ctx.stroke();

  ctx.fillStyle='#00E5A0';ctx.beginPath();ctx.roundRect(-12,18,25,25,7);ctx.fill();
  ctx.fillStyle='#1C1A2E';ctx.font='bold 10px Cinzel';ctx.textAlign='center';ctx.fillText('D',1,34);

  ctx.strokeStyle='#FFD700';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(-9,24);ctx.lineTo(-20-run*7,34);ctx.stroke();
  ctx.beginPath();ctx.moveTo(10,24);ctx.lineTo(21+run*6,30);ctx.stroke();

  ctx.fillStyle='#f2bc91';ctx.beginPath();ctx.arc(0,10,12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#4b2a19';ctx.beginPath();ctx.arc(-3,4,10,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillStyle='#1C1A2E';ctx.fillRect(-4,9,3,3);ctx.fillRect(5,9,3,3);
  ctx.strokeStyle='#1C1A2E';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(2,13,5,0.15,Math.PI-0.15);ctx.stroke();

  ctx.restore();
}

// start state
score=0;frameCount=0;speed=4;scrollX=0;scrollX2=0;
player={x:90,y:GROUND,w:28,h:56,vy:0,onGround:true,leg:0,legTimer:0};
obstacles=[];vitamins=[];particles=[];floatTexts=[];
doubleJump=false;doubleJumpTimer=0;doubleJumpActive=false;
flashRed=false;flashTimer=0;
gameState='start';
loop();
</script>
</body>
</html>
