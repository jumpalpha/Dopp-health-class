<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dopp Launch — Health Arcade</title>
<meta name="description" content="Play classroom health games and review activities from the Legend of Wellness health curriculum.">
<link rel="canonical" href="https://doppsclass.com/dopp_launch.html">
<meta property="og:title" content="Dopp Launch — Health Arcade">
<meta property="og:description" content="Play classroom health games and review activities from the Legend of Wellness health curriculum.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://doppsclass.com/dopp_launch.html">
<meta name="twitter:card" content="summary">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--emerald:#00E5A0;--sky:#38BFFF;--crimson:#FF3B5C;--bg:#FDFAF2;--border:rgba(28,26,46,0.12);--text:#1C1A2E;--dim:rgba(28,26,46,0.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;background:rgba(248,244,232,0.97);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.back-btn{color:var(--sky);text-decoration:none;font-weight:700;font-size:14px;white-space:nowrap}
.back-btn:hover{opacity:.7}
.game-title{font-family:'Cinzel Decorative',serif;font-size:clamp(13px,3vw,20px);font-weight:900;color:var(--gold);text-align:center}
.score-display{font-family:'Cinzel',serif;font-size:13px;color:var(--emerald);font-weight:600;min-width:70px;text-align:right}
main{flex:1;display:flex;flex-direction:column;align-items:center;padding:20px 16px;gap:14px}
canvas{border-radius:14px;max-width:100%;cursor:pointer;touch-action:none}
.power-wrap{width:100%;max-width:460px;display:flex;align-items:center;gap:12px}
.power-label{font-family:'Cinzel',serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--gold);white-space:nowrap}
.power-track{flex:1;height:18px;background:rgba(255,255,255,0.07);border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.power-fill{height:100%;width:0%;border-radius:9px;transition:none;background:linear-gradient(90deg,#00E5A0,#FFD700,#FF3B5C)}
.power-pct{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--text);min-width:40px;text-align:right}
.instruction{font-size:13px;color:var(--dim);text-align:center;min-height:20px}
.tip-box{width:100%;max-width:460px;background:rgba(0,229,160,0.07);border:1px solid rgba(0,229,160,0.2);border-radius:14px;padding:14px 18px;text-align:center;min-height:64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.tip-label{font-family:'Cinzel',serif;font-size:10px;font-weight:700;letter-spacing:2px;color:var(--emerald)}
.tip-text{font-size:13px;line-height:1.55}
.throws-wrap{display:flex;gap:8px}
.throw-dot{width:13px;height:13px;border-radius:50%;background:var(--gold)}
.throw-dot.used{background:rgba(255,255,255,0.12)}
.result-screen{display:none;flex-direction:column;align-items:center;gap:18px;text-align:center;width:100%;max-width:440px}
.result-title{font-family:'Cinzel Decorative',serif;font-size:clamp(20px,5vw,32px);font-weight:900;color:var(--gold)}
.big-score{font-family:'Cinzel',serif;font-size:clamp(48px,12vw,76px);font-weight:700;color:var(--emerald)}
.result-sub{font-size:14px;color:var(--dim);line-height:1.6}
.play-again-btn{background:linear-gradient(135deg,var(--gold),#FF8C00);color:#1C1A2E;border:none;padding:14px 36px;border-radius:12px;font-family:'Cinzel',serif;font-size:15px;font-weight:700;cursor:pointer;transition:transform .2s}
.play-again-btn:hover{transform:translateY(-2px)}
</style>
</head>
<body>
<header>
  <a class="back-btn" href="javascript:history.back()">← Back</a>
  <div class="game-title">Dopp Launch</div>
  <div class="score-display" id="scoreDisplay">Score: 0</div>
</header>
<main>
  <div class="throws-wrap" id="throwsWrap"></div>
  <canvas id="gc" width="480" height="260"></canvas>
  <div class="power-wrap">
    <div class="power-label">POWER</div>
    <div class="power-track"><div class="power-fill" id="powerFill"></div></div>
    <div class="power-pct" id="powerPct">0%</div>
  </div>
  <div class="instruction" id="instruction">Hold the button to charge, release to LAUNCH!</div>
  <button id="launchBtn" style="background:linear-gradient(135deg,#FF3B5C,#FF8C00);color:#fff;border:none;padding:13px 40px;border-radius:12px;font-family:'Cinzel',serif;font-size:16px;font-weight:700;cursor:pointer;transition:transform .15s;letter-spacing:.5px" onmousedown="startCharge()" onmouseup="release()" ontouchstart="startCharge(event)" ontouchend="release(event)">🚀 LAUNCH</button>
  <div class="tip-box" id="tipBox">
    <div class="tip-label">HEALTH MISSION</div>
    <div class="tip-text" id="tipText">Hold the LAUNCH button to charge power, release to send your character flying toward a health goal!</div>
  </div>
  <div class="result-screen" id="resultScreen">
    <div class="result-title">Mission Complete!</div>
    <div class="big-score" id="bigScore">0</div>
    <div style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold)">health points earned</div>
    <div class="result-sub" id="resultSub"></div>
    <button class="play-again-btn" onclick="restartGame()">Play Again</button>
  </div>
</main>

<script>
const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');
const W=canvas.width, H=canvas.height;
const MAX_LAUNCHES = 5;

const targets = [
  {x:0.30, label:'💧 Hydration',  pts:15, color:'#38BFFF', tip:'Hydration hit! Water regulates body temperature, carries nutrients to cells, and flushes out toxins.'},
  {x:0.50, label:'😴 Sleep',      pts:25, color:'#9B59B6', tip:'Sleep zone reached! 8 hours of sleep improves memory consolidation, immune function, and emotional regulation.'},
  {x:0.68, label:'🥗 Nutrition',  pts:35, color:'#00E5A0', tip:'Nutrition goal! A balanced diet rich in vegetables reduces chronic disease risk by over 30%.'},
  {x:0.85, label:'🏃 Exercise',   pts:50, color:'#FFD700', tip:'Exercise bullseye! 150 minutes of moderate exercise per week is the minimum recommended for good health.'},
  {x:1.05, label:'⚡ Overshoot',  pts:10, color:'#FF3B5C', tip:'Overshot! Even too much of a good thing needs balance. Rest and recovery are part of fitness!'},
];

let power=0, charging=false, chargeAnim=null;
let launches=0, totalScore=0;
let charX=0, charY=0, flying=false, flyAnim=null;
let chargeDir=1, prevPower=0;

function getTarget(pct){
  if(pct<20) return targets[0];
  if(pct<40) return targets[1];
  if(pct<60) return targets[2];
  if(pct<80) return targets[3];
  return targets[4];
}

function drawScene(charPosX, charPosY, flyProgress){
  ctx.clearRect(0,0,W,H);
  // sky bg
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a1030'); sky.addColorStop(1,'#1C1A2E');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // ground
  ctx.fillStyle='#1a2240'; ctx.fillRect(0,H-30,W,30);
  ctx.fillStyle='#00E5A0'; ctx.fillRect(0,H-32,W,4);

  // stars
  ctx.fillStyle='rgba(255,255,255,0.5)';
  [[50,40],[120,20],[200,55],[320,30],[400,15],[440,60]].forEach(([sx,sy])=>{
    ctx.beginPath(); ctx.arc(sx,sy,1.2,0,Math.PI*2); ctx.fill();
  });

  // target platforms
  targets.forEach((t,i)=>{
    const tx=t.x*W, ty=H-30;
    ctx.fillStyle=t.color+'33';
    ctx.beginPath(); ctx.arc(tx,ty-20,24,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=t.color; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(tx,ty-20,24,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=t.color;
    ctx.font='bold 10px Nunito,sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(t.label, tx, ty-48);
    ctx.font='bold 11px Cinzel,serif'; ctx.fillStyle='#fff';
    ctx.fillText(t.pts+'pt', tx, ty-20);
  });

  // launch platform
  ctx.fillStyle='#FFD700';
  ctx.fillRect(30, H-50, 50, 20);
  ctx.fillStyle='rgba(255,215,0,0.15)';
  ctx.fillRect(30, H-50, 50, 20);

  // character
  const cx2 = charPosX ?? 55;
  const cy2 = charPosY ?? H-60;
  drawCharacter(cx2, cy2, flying);
}

function drawCharacter(x,y,isFlying){
  ctx.save();
  if(isFlying){ctx.translate(x,y); ctx.rotate(-0.4);}else{ctx.translate(x,y);}
  // body
  ctx.fillStyle='#38BFFF';
  ctx.beginPath(); ctx.ellipse(0,0,12,16,0,0,Math.PI*2); ctx.fill();
  // head
  ctx.fillStyle='#FFDAB9';
  ctx.beginPath(); ctx.arc(0,-22,10,0,Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle='#1C1A2E';
  ctx.beginPath(); ctx.arc(-3.5,-23,2,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(3.5,-23,2,0,Math.PI*2); ctx.fill();
  // smile
  ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.arc(0,-22,5,0.2,Math.PI-0.2); ctx.stroke();
  // cape (flying)
  if(isFlying){
    ctx.fillStyle='rgba(255,59,92,0.7)';
    ctx.beginPath(); ctx.moveTo(-12,0); ctx.lineTo(-28,12); ctx.lineTo(-12,16); ctx.closePath(); ctx.fill();
  }
  // trail
  if(isFlying){
    ctx.fillStyle='rgba(255,215,0,0.3)';
    for(let i=1;i<=4;i++){
      ctx.beginPath(); ctx.arc(-i*10*0.6, i*4*0.3, 5-i, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

function startCharge(e){
  if(e) e.preventDefault();
  if(flying || launches>=MAX_LAUNCHES) return;
  charging=true;
  if(chargeAnim) cancelAnimationFrame(chargeAnim);
  function tick(){
    if(!charging) return;
    power = Math.min(100, power + 1.2);
    if(power>=100) chargeDir=-1;
    document.getElementById('powerFill').style.width=power+'%';
    document.getElementById('powerPct').textContent=Math.round(power)+'%';
    chargeAnim=requestAnimationFrame(tick);
  }
  tick();
}

function release(e){
  if(e) e.preventDefault();
  if(!charging) return;
  charging=false;
  if(chargeAnim) cancelAnimationFrame(chargeAnim);
  const launchPower=power;
  power=0;
  document.getElementById('powerFill').style.width='0%';
  document.getElementById('powerPct').textContent='0%';
  doLaunch(launchPower);
}

function doLaunch(pwr){
  if(launches>=MAX_LAUNCHES) return;
  flying=true; launches++;
  const tgt = getTarget(pwr);
  const startX=55, startY=H-60;
  const endX=tgt.x*W, endY=H-60;
  const peakY = H-60 - (pwr/100)*160;
  const dur=900, start=Date.now();
  document.getElementById('launchBtn').disabled=true;
  document.getElementById('instruction').textContent='Flying…';
  updateThrows();

  function flyTick(){
    const t=Math.min(1,(Date.now()-start)/dur);
    const ease=t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2;
    const x=startX+(endX-startX)*ease;
    const parabola=(1-(2*t-1)*(2*t-1));
    const y=startY - parabola*(startY-peakY);
    drawScene(x, y, true);
    if(t<1){requestAnimationFrame(flyTick);}
    else{
      flying=false;
      totalScore+=tgt.pts;
      document.getElementById('scoreDisplay').textContent='Score: '+totalScore;
      document.getElementById('tipText').textContent='🎯 '+tgt.label+' — +'+tgt.pts+' pts! '+tgt.tip;
      document.getElementById('tipBox').style.borderColor=tgt.color+'66';
      drawScene(startX,startY,false);
      if(launches>=MAX_LAUNCHES){
        setTimeout(showEnd,700);
      } else {
        document.getElementById('launchBtn').disabled=false;
        document.getElementById('instruction').textContent='Hold the button to charge, release to LAUNCH!';
      }
    }
  }
  requestAnimationFrame(flyTick);
}

function updateThrows(){
  const d=document.getElementById('throwsWrap');
  d.innerHTML='';
  for(let i=0;i<MAX_LAUNCHES;i++){
    const dot=document.createElement('div');
    dot.className='throw-dot'+(i<launches?' used':'');
    d.appendChild(dot);
  }
}

function showEnd(){
  document.getElementById('resultScreen').style.display='flex';
  document.getElementById('bigScore').textContent=totalScore;
  const max=MAX_LAUNCHES*50;
  const pct=totalScore/max;
  document.getElementById('resultSub').textContent=pct>=0.8?'🏆 Health champion! You hit every goal with precision!' : pct>=0.5?'🌟 Great effort! Your health goals are within reach.' : '💪 Keep going! Consistent small steps lead to big health wins.';
}

function restartGame(){
  power=0; launches=0; totalScore=0; flying=false;
  document.getElementById('scoreDisplay').textContent='Score: 0';
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('powerFill').style.width='0%';
  document.getElementById('powerPct').textContent='0%';
  document.getElementById('tipText').textContent='Hold the LAUNCH button to charge power, release to send your character flying toward a health goal!';
  document.getElementById('tipBox').style.borderColor='';
  document.getElementById('instruction').textContent='Hold the button to charge, release to LAUNCH!';
  document.getElementById('launchBtn').disabled=false;
  updateThrows(); drawScene(55,H-60,false);
}

updateThrows(); drawScene(55,H-60,false);
</script>
</body>
</html>
