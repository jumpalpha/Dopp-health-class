<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Who Wants to Be a Millionaire — Health Edition</title>
<style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0a0a2e;color:#fff;padding:16px;min-height:100vh}.hdr{background:#0a0a2e;border:2px solid #1a237e;border-radius:12px;padding:14px 20px;text-align:center;margin-bottom:14px}.hdr-title{font-size:18px;font-weight:700;color:#FFD700;letter-spacing:1px}.q-box{background:#0a0a2e;border:2px solid #1a237e;border-radius:12px;padding:18px;margin-bottom:12px}.q-num{font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-bottom:6px}.q-text{font-size:15px;color:#fff;line-height:1.6;text-align:center}.q-val{text-align:center;color:#FFD700;font-size:13px;font-weight:700;margin-top:8px}.options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}.opt{background:#0d1b5e;border:1.5px solid #3949ab;border-radius:8px;padding:11px 14px;cursor:pointer;color:#fff;font-size:13px;line-height:1.4;display:flex;align-items:flex-start;gap:8px;transition:background .15s}.opt:hover:not(.disabled){background:#1a237e}.opt.correct{background:#1B5E20;border-color:#4CAF50}.opt.wrong{background:#B71C1C;border-color:#f44336}.opt.disabled{cursor:default}.opt.eliminated{opacity:.25;cursor:default}.opt-letter{font-weight:700;color:#FFD700;min-width:18px}.lifelines{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}.lifeline{flex:1;min-width:80px;background:#0d1b5e;border:1px solid #3949ab;border-radius:8px;padding:8px;text-align:center;cursor:pointer}.lifeline:hover:not(.used-ll){background:#1a237e}.lifeline.used-ll{opacity:.3;cursor:default}.ll-icon{font-size:18px;margin-bottom:2px}.ll-label{font-size:11px;color:rgba(255,255,255,0.7)}.money-tree{display:flex;flex-direction:column;gap:3px;margin-bottom:12px}.money-row{display:flex;justify-content:space-between;align-items:center;padding:4px 12px;border-radius:6px;font-size:12px}.money-row.current{background:#1a237e;color:#FFD700;font-weight:700}.money-row.passed{background:rgba(27,94,32,0.3);color:#81C784}.money-row.future{color:rgba(255,255,255,0.4)}.safe-marker{font-size:10px;color:#FFD700;margin-left:4px}.status-msg{background:#0a0a2e;border-radius:8px;padding:10px 14px;font-size:13px;color:rgba(255,255,255,0.8);text-align:center;margin-bottom:10px;min-height:36px}.btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:10px}.btn{padding:9px 20px;border-radius:8px;border:none;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}.btn-walk{background:#E65100;color:#fff}.btn-neutral{background:rgba(255,255,255,0.1);color:#fff}</style>
</head><body>
<div id="game"></div>
<script>
const QS=[
  {q:"What percentage of your daily plate should be fruits and vegetables per MyPlate?",opts:["A: 25%","B: Half","C: One third","D: Three quarters"],ans:1,val:"$100"},
  {q:"What does BMI stand for in health assessments?",opts:["A: Body Mass Index","B: Basic Metabolic Indicator","C: Blood Muscle Inventory","D: Bone Mineral Integration"],ans:0,val:"$200"},
  {q:"The ABCDE rule identifies warning signs of which serious condition?",opts:["A: Diabetes","B: Melanoma","C: Osteoporosis","D: Asthma"],ans:1,val:"$300"},
  {q:"How many hours of sleep does the AAP recommend for teens ages 13–18?",opts:["A: 6–7 hours","B: 7–8 hours","C: 8–10 hours","D: 10–12 hours"],ans:2,val:"$500"},
  {q:"What connective tissue connects bone to bone at joints?",opts:["A: Tendon","B: Cartilage","C: Ligament","D: Fascia"],ans:2,val:"$1,000",safe:true},
  {q:"What does U=U stand for in HIV/AIDS treatment?",opts:["A: Untested = Unsafe","B: Undetectable = Untransmittable","C: Uninfected = Unprotected","D: Universal = Unavoidable"],ans:1,val:"$2,000"},
  {q:"In 2024, what % of 8th–12th graders reported past-30-day alcohol use — a 25-year low?",opts:["A: 45%","B: 26%","C: 13%","D: 5%"],ans:2,val:"$4,000"},
  {q:"The drug fentanyl is approximately how many times more potent than morphine?",opts:["A: 5–10 times","B: 20–30 times","C: 50–100 times","D: 200–300 times"],ans:2,val:"$8,000"},
  {q:"Per updated 2017 AHA guidelines, Stage 1 hypertension begins at which blood pressure?",opts:["A: 120/80","B: 130/80","C: 140/90","D: 150/95"],ans:1,val:"$16,000",safe:true},
  {q:"Congenital syphilis cases in the U.S. have risen approximately how much in the past decade?",opts:["A: 50%","B: 150%","C: 400%","D: 700%"],ans:3,val:"$32,000"},
  {q:"The mRNA COVID-19 vaccines were developed and authorized in approximately how many months?",opts:["A: 4 months","B: 8 months","C: 11 months","D: 18 months"],ans:2,val:"$500,000"},
  {q:"How many Americans ages 12+ had Alcohol Use Disorder in 2023 per NIAAA data?",opts:["A: 8.5 million","B: 17 million","C: 23 million","D: 29.5 million"],ans:3,val:"$1,000,000"},
];
const SAFE=[4,8];
let qIdx=0,score='$0',used={fifty:false,phone:false,poll:false},eliminated=[],answered=false,gameOver=false;
function render(){
  if(gameOver){renderOver();return;}
  const q=QS[qIdx];
  document.getElementById('game').innerHTML=`
    <div class="hdr"><div class="hdr-title">WHO WANTS TO BE A MILLIONAIRE?</div><div style="font-size:11px;color:rgba(255,215,0,0.6);margin-top:3px">Health Edition — Legend of Wellness</div></div>
    <div class="money-tree">${QS.map((qq,i)=>{const cls=i<qIdx?'passed':i===qIdx?'current':'future';return`<div class="money-row ${cls}">${SAFE.includes(i)?`<span class="safe-marker">★</span>`:'<span style="width:14px"></span>'}<span>${qq.val}</span><span>${i===qIdx?'← you':''}</span></div>`;}).reverse().join('')}</div>
    <div class="lifelines">
      <div class="lifeline${used.fifty?' used-ll':''}" onclick="doFiftyFifty()"><div class="ll-icon" style="font-size:14px">50:50</div><div class="ll-label">50/50</div></div>
      <div class="lifeline${used.phone?' used-ll':''}" onclick="doPhone()"><div class="ll-icon" style="font-size:14px">📞</div><div class="ll-label">Phone a Friend</div></div>
      <div class="lifeline${used.poll?' used-ll':''}" onclick="doPoll()"><div class="ll-icon" style="font-size:14px">📊</div><div class="ll-label">Ask the Class</div></div>
    </div>
    <div class="q-box"><div class="q-num">Question ${qIdx+1} of ${QS.length}</div><div class="q-text">${q.q}</div><div class="q-val">${q.val}</div></div>
    <div class="options" id="opts">${q.opts.map((o,i)=>`<div class="opt${eliminated.includes(i)?' eliminated':''}" onclick="pick(${i})" id="opt${i}"><span class="opt-letter">${'ABCD'[i]}:</span>${o.substring(3)}</div>`).join('')}</div>
    <div class="status-msg" id="status">Choose an answer, or use a lifeline!</div>
    <div class="btns"><button class="btn btn-walk" onclick="walkAway()">Walk Away (keep ${score})</button><button class="btn btn-neutral" onclick="init()">Restart</button></div>`;
}
function pick(i){if(answered||gameOver)return;answered=true;const q=QS[qIdx];const o=document.getElementById('opt'+i);const correct=document.getElementById('opt'+q.ans);if(i===q.ans){o.classList.add('correct');score=q.val;document.getElementById('status').textContent='Correct! You\'ve won '+q.val+'!';setTimeout(()=>{answered=false;eliminated=[];if(qIdx===QS.length-1){gameOver=true;renderOver();}else{qIdx++;render();}},1800);}else{o.classList.add('wrong');correct.classList.add('correct');const safe=SAFE.filter(s=>s<qIdx).pop();const safePts=safe!==undefined?QS[safe].val:'$0';document.getElementById('status').textContent='Wrong! Correct: '+['A','B','C','D'][q.ans]+'. You leave with '+safePts+'.';score=safePts;gameOver=true;setTimeout(renderOver,2000);}}
function doFiftyFifty(){if(used.fifty||answered)return;used.fifty=true;const q=QS[qIdx];const wrongs=[0,1,2,3].filter(i=>i!==q.ans&&!eliminated.includes(i));let removed=0;while(removed<2&&wrongs.length){const r=wrongs.splice(Math.floor(Math.random()*wrongs.length),1)[0];eliminated.push(r);removed++;}render();document.getElementById('status').textContent='50/50 used!';}
function doPhone(){if(used.phone||answered)return;used.phone=true;render();document.getElementById('status').textContent='Your friend says: "I\'m pretty sure it\'s '+['A','B','C','D'][QS[qIdx].ans]+'... but not 100% sure!"';}
function doPoll(){if(used.poll||answered)return;used.poll=true;const q=QS[qIdx];const norm=[0,1,2,3].map(i=>{if(i===q.ans)return 52+Math.floor(Math.random()*20);return Math.floor(Math.random()*18);});const tot=norm.reduce((a,b)=>a+b,0);const pcts=norm.map(p=>Math.round(p/tot*100));render();document.getElementById('status').innerHTML='Class poll: '+['A','B','C','D'].map((l,i)=>`${l}: <strong>${pcts[i]}%</strong>`).join(' | ');}
function walkAway(){gameOver=true;document.getElementById('game').innerHTML=`<div class="hdr"><div class="hdr-title">YOU WALKED AWAY</div></div><div style="text-align:center;padding:20px"><div style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:6px">You walked away with</div><div style="color:#FFD700;font-size:36px;font-weight:700">${score}</div></div><div class="btns"><button class="btn btn-neutral" onclick="init()">Play Again</button></div>`;}
function renderOver(){document.getElementById('game').innerHTML=`<div class="hdr"><div class="hdr-title">${qIdx===QS.length-1&&score===QS[QS.length-1].val?'ONE MILLION DOLLARS!':'GAME OVER'}</div></div><div style="text-align:center;padding:20px"><div style="color:rgba(255,255,255,0.6);font-size:13px;margin-bottom:6px">${qIdx===QS.length-1&&score===QS[QS.length-1].val?'CONGRATULATIONS!':'You finished with:'}</div><div style="color:#FFD700;font-size:36px;font-weight:700">${score}</div></div><div class="btns"><button class="btn btn-neutral" onclick="init()">Play Again</button></div>`;}
function init(){qIdx=0;score='$0';used={fifty:false,phone:false,poll:false};eliminated=[];answered=false;gameOver=false;render();}
init();
</script>
</body></html>
